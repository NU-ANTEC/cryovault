// ── STEP 3: Select rack ───────────────────────────────────────────────────────
async function wfSelectRack(){
  showLoading();
  try {
    const racks = await api('GET', `/tanks/${curTank.id}/racks`);
    if(!racks.length){
      hideLoading();
      toast('No racks found. Create a rack first.', 'err');
      return;
    }

    const items = racks.map(r => `
      <div class="wf-select-item" onclick="wfPickRack(${JSON.stringify(JSON.stringify(r))})">
        <div class="wf-select-item-left">
          <div class="wf-select-item-name">${escHtml(r.name)}</div>
          <div class="wf-select-item-sub">${escHtml(r.position||'—')} · ${r.capacity} slots</div>
        </div>
        <div class="wf-select-item-arrow">›</div>
      </div>`).join('');

    hideLoading();
    openModal(`
      <h2>▦ SELECT RACK</h2>
      ${wfStepBar(3, ['Scan','Confirm','Rack','Box','Position','Details'])}
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:12px">
        QR: <span style="color:var(--accent)">${escHtml(wfState.qrCode)}</span>
      </div>
      <div class="wf-select-list">${items}</div>
      <div class="modal-actions"><button class="btn" onclick="wfShowNotFound(wfState.qrCode)">‹ BACK</button></div>
    `);
  } catch(e){ hideLoading(); toast(e.message,'err'); }
}

// onclick receives a double-JSON-stringified rack to safely pass objects
function wfPickRack(rackJson){
  wfState.rack = JSON.parse(rackJson);
  wfSelectBox();
}

// ── STEP 4: Select box ────────────────────────────────────────────────────────
async function wfSelectBox(){
  showLoading();
  try {
    const boxes = await api('GET', `/racks/${wfState.rack.id}/boxes`);
    if(!boxes.length){
      hideLoading();
      toast('No boxes in this rack. Create a box first.', 'err');
      return;
    }

    const items = boxes.map(b => {
      const cap = b.rows * b.cols;
      return `
        <div class="wf-select-item" onclick="wfPickBox(${JSON.stringify(JSON.stringify(b))})">
          <div class="wf-select-item-left">
            <div class="wf-select-item-name">${escHtml(b.name)}</div>
            <div class="wf-select-item-sub">Slot ${b.slot_position} · ${b.rows}×${b.cols} grid</div>
          </div>
          <div class="wf-select-item-arrow">›</div>
        </div>`;
    }).join('');

    hideLoading();
    openModal(`
      <h2>▦ SELECT BOX</h2>
      ${wfStepBar(4, ['Scan','Confirm','Rack','Box','Position','Details'])}
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:12px">
        Rack: <span style="color:var(--accent)">${escHtml(wfState.rack.name)}</span>
      </div>
      <div class="wf-select-list">${items}</div>
      <div class="modal-actions"><button class="btn" onclick="wfSelectRack()">‹ BACK</button></div>
    `);
  } catch(e){ hideLoading(); toast(e.message,'err'); }
}

function wfPickBox(boxJson){
  wfState.box = JSON.parse(boxJson);
  wfSelectPosition();
}

// ── STEP 5: Select position ───────────────────────────────────────────────────
async function wfSelectPosition(){
  showLoading();
  try {
    const { box, vials } = await api('GET', `/boxes/${wfState.box.id}/vials`);
    wfState.box = box;
    const vialMap = {};
    for(const v of vials) vialMap[`${v.row_index},${v.col_index}`] = v;

    const rows = box.rows, cols = box.cols;

    // Build column labels
    let colHtml = `<div class="col-labels-row"><div class="col-label-spacer"></div><div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:4px;flex:1">`;
    for(let c = 0; c < cols; c++) colHtml += `<div class="col-label">${colLbl(c)}</div>`;
    colHtml += '</div></div>';

    // Build vial grid — occupied cells are dimmed and non-clickable
    let gridHtml = '';
    for(let r = 0; r < rows; r++){
      gridHtml += `<div class="row-wrap"><div class="row-label">${rowLbl(r)}</div><div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:4px;flex:1">`;
      for(let c = 0; c < cols; c++){
        const v = vialMap[`${r},${c}`];
        if(v){
          // Occupied — show filled, non-interactive
          gridHtml += `<div class="vial occupied" style="cursor:not-allowed;opacity:.5" title="${escHtml(v.name)} (occupied)">●</div>`;
        } else {
          // Empty — clickable
          gridHtml += `<div class="vial" onclick="wfPickPosition(${r},${c})" title="Add to ${rowLbl(r)}${colLbl(c)}"></div>`;
        }
      }
      gridHtml += '</div></div>';
    }

    const usedCount = vials.length;
    const capCount  = rows * cols;

    hideLoading();
    openModal(`
      <h2>▦ SELECT POSITION</h2>
      ${wfStepBar(5, ['Scan','Confirm','Rack','Box','Position','Details'])}
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:12px">
        ${escHtml(wfState.rack.name)} › Slot ${wfState.box.slot_position} › <span style="color:var(--accent)">${escHtml(box.name)}</span>
        &nbsp;·&nbsp; ${usedCount}/${capCount} occupied
      </div>

      <div class="wf-grid-wrap">
        <div class="wf-grid-label">Click an empty cell to place the vial there.</div>
        <div class="legend" style="margin-bottom:10px">
          <div class="legend-item"><div class="legend-box" style="background:rgba(0,120,180,.25);border-color:var(--accent2);opacity:.5"></div>Occupied (unavailable)</div>
          <div class="legend-item"><div class="legend-box" style="background:var(--surface);border-color:var(--border)"></div>Empty (click to select)</div>
        </div>
        ${colHtml}
        ${gridHtml}
      </div>

      <div class="modal-actions"><button class="btn" onclick="wfSelectBox()">‹ BACK</button></div>
    `);
  } catch(e){ hideLoading(); toast(e.message,'err'); }
}

function wfPickPosition(row, col){
  wfState.row = row;
  wfState.col = col;
  wfShowAddForm();
}

// ── STEP 6: Add vial form — QR pre-filled ────────────────────────────────────
// This step reuses the existing vialForm() helper but with the QR code
// pre-filled and marked read-only (since it came from the scanner).
// The form renders inside the workflow modal instead of the standard modal.
function wfShowAddForm(){
  const pos = `${rowLbl(wfState.row)}${colLbl(wfState.col)}`;

  // Build a vial form with the scanned QR pre-filled.
  // We inline a small override: the qr_code field is made read-only
  // so the operator can't accidentally change it after scanning.
  const formHtml = `
    <div class="form-group"><label class="form-label">Sample Name *</label><input class="form-input" id="f-vname" placeholder="e.g. HEK293-GFP-P12"/></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Type</label>
        <select class="form-select" id="f-vtype">
          ${['','Cell Line','Bacteria','Virus','DNA','RNA','Protein','Serum','Tissue','Other'].map(t=>`<option value="${t}">${t||'—'}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Date Stored</label>
        <input class="form-input" id="f-vdate" type="date" value="${new Date().toISOString().slice(0,10)}"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Volume</label><input class="form-input" id="f-vvol" placeholder="500 µL"/></div>
      <div class="form-group"><label class="form-label">Concentration</label><input class="form-input" id="f-vconc" placeholder="1×10⁶"/></div>
    </div>
    <div class="form-group"><label class="form-label">Researcher</label><input class="form-input" id="f-vres" value="${escHtml(getRes())}" placeholder="Name"/></div>
    <div class="form-group">
      <label class="form-label">QR Code <span style="color:var(--success);font-size:9px">● SCANNED</span></label>
      <!-- Read-only: value came from the scanner; shown for confirmation only -->
      <input class="form-input" id="f-vqr" value="${escHtml(wfState.qrCode)}" readonly
        style="color:var(--accent);border-color:var(--success);cursor:default"/>
    </div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="f-vnotes"></textarea></div>`;

  openModal(`
    <h2>▦ ADD VIAL — ${escHtml(wfState.box.name)} / ${pos}</h2>
    ${wfStepBar(6, ['Scan','Confirm','Rack','Box','Position','Details'])}

    <div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:14px">
      ${escHtml(wfState.rack.name)} › Slot ${wfState.box.slot_position} › ${escHtml(wfState.box.name)} ›
      <span style="color:var(--accent)">Position ${pos}</span>
    </div>

    ${formHtml}

    <div class="modal-actions">
      <button class="btn" onclick="wfSelectPosition()">‹ BACK</button>
      <button class="btn btn-success" onclick="wfSaveVial()">＋ ADD VIAL</button>
    </div>
  `);
}

async function wfSaveVial(){
  const name = (document.getElementById('f-vname')?.value || '').trim();
  if(!name){ toast('Sample name is required', 'err'); return; }

  const payload = {
    name,
    sample_type:   document.getElementById('f-vtype')?.value   || '',
    date_stored:   document.getElementById('f-vdate')?.value   || '',
    volume:        document.getElementById('f-vvol')?.value.trim()  || '',
    concentration: document.getElementById('f-vconc')?.value.trim() || '',
    researcher:    document.getElementById('f-vres')?.value.trim()  || getRes(),
    qr_code:       wfState.qrCode,   // always from the scan, not the (read-only) input
    notes:         document.getElementById('f-vnotes')?.value.trim() || '',
    changedBy:     getRes(),
  };

  try {
    await api('PUT',
      `/boxes/${wfState.box.id}/vials/${wfState.row}/${wfState.col}`,
      payload
    );

    const boxId  = wfState.box.id;
    const rackId = wfState.rack.id;
    const row    = wfState.row;
    const col    = wfState.col;

    wfState = null;
    closeModal();
    toast(`Vial "${name}" added at ${rowLbl(row)}${colLbl(col)}`);

    // Navigate to the box view and highlight the newly added vial
    highlightVial = { r: row, c: col };
    selVial       = { r: row, c: col };
    await goBox(rackId, boxId);

  } catch(e){
    toast('Save failed: ' + e.message, 'err');
  }
}

// ── ARCHIVE VIEW ──────────────────────────────────────────────────────────────
async function renderArchive(){
  showLoading();
  const el=document.getElementById('main-content');
  let archiveFilter='all', archiveSearch='';

  async function fetchAndRender(){
    try{
      const params=new URLSearchParams();
      if(archiveFilter!=='all') params.set('type',archiveFilter);
      if(archiveSearch) params.set('q',archiveSearch);
      const data=await api('GET',`/archive?${params}`);
      const{results,total}=data;

      const fmtArchived=d=>d?new Date(d).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';

      const pills=[
        {key:'all',   label:'All',   count:total},
        {key:'rack',  label:'Racks', count:results.racks.length},
        {key:'box',   label:'Boxes', count:results.boxes.length},
        {key:'vial',  label:'Vials', count:results.vials.length},
      ].map(p=>`<button class="filter-pill ${archiveFilter===p.key?'active':''}" onclick="setArchiveFilter('${p.key}')">${p.label}<span class="pill-count">${p.count}</span></button>`).join('');

      let rows='';

      if((archiveFilter==='all'||archiveFilter==='rack')&&results.racks.length){
        rows+=`<div class="results-section"><div class="results-section-title">Racks <span class="count-badge rack-count-badge">${results.racks.length}</span></div>`;
        for(const r of results.racks){
          rows+=`<div class="result-card">
            <div class="result-icon rack">RK</div>
            <div class="result-body">
              <div class="result-name">${escHtml(r.name)}</div>
              <div class="result-path">📍 ${escHtml(r.position||'—')} · Archived ${fmtArchived(r.archived_at)}</div>
            </div>
            <div class="result-meta">
              <button class="btn btn-sm btn-success" onclick="restoreItem('rack','${r.id}','${jsStr(r.name)}')">↺ RESTORE</button>
            </div>
          </div>`;
        }
        rows+=`</div>`;
      }

      if((archiveFilter==='all'||archiveFilter==='box')&&results.boxes.length){
        rows+=`<div class="results-section"><div class="results-section-title">Boxes <span class="count-badge box-count-badge">${results.boxes.length}</span></div>`;
        for(const b of results.boxes){
          rows+=`<div class="result-card">
            <div class="result-icon box">BX</div>
            <div class="result-body">
              <div class="result-name">${escHtml(b.name)}</div>
              <div class="result-path">📍 ${escHtml(b.rack_name)} · Slot ${b.slot_position} · Archived ${fmtArchived(b.archived_at)}</div>
            </div>
            <div class="result-meta">
              <button class="btn btn-sm btn-success" onclick="restoreItem('box','${b.id}','${jsStr(b.name)}')">↺ RESTORE</button>
            </div>
          </div>`;
        }
        rows+=`</div>`;
      }

      if((archiveFilter==='all'||archiveFilter==='vial')&&results.vials.length){
        rows+=`<div class="results-section"><div class="results-section-title">Vials <span class="count-badge vial-count-badge">${results.vials.length}</span></div>`;
        for(const v of results.vials){
          rows+=`<div class="result-card">
            <div class="result-icon vial">${escHtml(v.position_label||'—')}</div>
            <div class="result-body">
              <div class="result-name">${escHtml(v.name)}</div>
              <div class="result-path">📍 ${escHtml(v.path||'—')} · Archived ${fmtArchived(v.archived_at)}</div>
              ${v.sample_type?`<div class="result-match">${escHtml(v.sample_type)}${v.researcher?' · '+escHtml(v.researcher):''}</div>`:''}
            </div>
            <div class="result-meta">
              <button class="btn btn-sm btn-success" onclick="restoreItem('vial','${v.id}','${jsStr(v.name)}')">↺ RESTORE</button>
            </div>
          </div>`;
        }
        rows+=`</div>`;
      }

      el.innerHTML=`
        <div class="section-header">
          <div class="section-left">
            <div class="section-title">Archive</div>
            <div class="section-sub">${total} archived item${total!==1?'s':''}</div>
          </div>
          <div class="section-right">
            <button class="btn btn-danger" onclick="openPurgeModal()">✕ PURGE ARCHIVE</button>
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
          <input class="form-input" style="flex:1;max-width:260px" placeholder="Search archived items…"
            value="${escHtml(archiveSearch)}" oninput="archiveSearch=this.value;fetchAndRender()"/>
        </div>
        <div class="search-filters">${pills}</div>
        ${total===0
          ?`<div class="empty-state">No archived items.<br><span style="font-size:10px">Enable "Archive on delete" in Settings to keep deleted items recoverable.</span></div>`
          :rows}`;
    }catch(e){toast(e.message,'err');}finally{hideLoading();}
  }

  // Make filter setter accessible from onclick
  window.setArchiveFilter=f=>{archiveFilter=f;showLoading();fetchAndRender();};
  await fetchAndRender();
}

// ============================================================================
// MOVE VIAL / MOVE BOX — multi-step modal workflow
// ============================================================================
//
// openMoveVial(row, col)  — opens the move workflow for the vial at row/col
//                           in the current box (curBox)
// openMoveBox(boxId, ...)  — opens the move workflow for a box
//
// Both workflows share the same step sequence for picking the destination:
//   Step 1: Pick tank
//   Step 2: Pick rack (within chosen tank)
//   Step 3: Pick slot (box move) / Pick box (vial move)
//   Step 4 (vial only): Pick position within chosen box
//   Confirm → call API → navigate to new location
//
// State is kept in mvState so each step can read prior choices.
// ============================================================================

let mvState = null;  // { mode: 'vial'|'box', ...source info, tank, rack, box, slot }

// ── Helper: step bar labels ───────────────────────────────────────────────────
function mvStepBar(current, labels){
  let h = '<div class="wf-steps">';
  labels.forEach((label, i) => {
    const n   = i + 1;
    const cls = n < current ? 'done' : n === current ? 'active' : '';
    h += `<div class="wf-step ${cls}" title="${label}">${label}</div>`;
    if(i < labels.length - 1) h += '<div class="wf-step-line"></div>';
  });
  return h + '</div>';
}

// ── Helper: "moving from" context card ───────────────────────────────────────
function mvFromCard(){
  if(mvState.mode === 'vial'){
    const pos = `${rowLbl(mvState.row)}${colLbl(mvState.col)}`;
    return `<div class="move-from">
      <div class="move-from-label">Moving vial</div>
      <div class="move-from-value">${escHtml(mvState.vialName)}</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:3px">
        from ${escHtml(mvState.sourceRackName)} › Slot ${mvState.sourceSlot} › ${escHtml(mvState.sourceBoxName)} › ${pos}
      </div>
    </div>`;
  } else {
    return `<div class="move-from">
      <div class="move-from-label">Moving box</div>
      <div class="move-from-value">${escHtml(mvState.boxName)}</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:3px">
        from ${escHtml(mvState.sourceRackName)} › Slot ${mvState.sourceSlot}
      </div>
    </div>`;
  }
}

// =============================================================================
// ENTRY POINTS
// =============================================================================

function openMoveVial(row, col){
  const vMap = {};
  for(const v of curBox._vials||[]) vMap[`${v.row_index},${v.col_index}`] = v;
  const v = vMap[`${row},${col}`];
  if(!v){ toast('No vial at that position', 'err'); return; }

  mvState = {
    mode:          'vial',
    vialId:        v.id,
    vialName:      v.name,
    sourceBoxId:   curBox.id,
    sourceBoxName: curBox.name,
    sourceSlot:    curBox.slot_position,
    sourceRackName: curRack?.name || '—',
    row, col,
    // destination — filled in as user picks
    tank: null, rack: null, box: null, targetRow: null, targetCol: null,
  };
  mvPickTank();
}

function openMoveBox(boxId, boxName, slotPos){
  mvState = {
    mode:          'box',
    boxId,
    boxName,
    sourceSlot:    slotPos,
    sourceRackId:  curRack?.id,
    sourceRackName: curRack?.name || '—',
    tank: null, rack: null, targetSlot: null,
  };
  mvPickTank();
}

async function openMoveRack(rackId, rackName){

    hideLoading();

      const isCurrent = t.id === current;
      return `<div class="wf-select-item${isCurrent?' wf-select-item-disabled':''}"

        <div class="wf-select-item-left">
          <div class="wf-select-item-name">${escHtml(t.name)}</div>
          ${isCurrent ? '<div style="font-family:var(--font-mono);font-size:10px;color:var(--muted)">Current tank</div>' : ''}
        </div>
        ${!isCurrent ? '<div class="wf-select-item-arrow">›</div>' : ''}
      </div>`;
    }).join('');

    openModal(`
      <h2>↦ MOVE RACK</h2>
      <div class="move-from">
        <div class="move-from-label">Moving rack</div>
        <div class="move-from-value">${escHtml(rackName)}</div>
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:3px">
          from tank: ${escHtml(curTank?.name || '—')}
        </div>
      </div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:10px">
        Select destination tank:
      </div>
      <div class="wf-select-list">${items}</div>
      <div class="modal-actions"><button class="btn" onclick="closeModal()">CANCEL</button></div>`);
  }catch(e){
    hideLoading();
    toast('Failed to load tanks: ' + e.message, 'err');
  }
}

async function doMoveRack(rackId, rackName, targetTankId, targetTankName){
  closeModal();
  showLoading();
  try{
    await api('POST', `/racks/${rackId}/move`, {
      target_tank_id: targetTankId,
      changedBy: getRes()
    });
    toast(`Rack "${rackName}" moved to ${targetTankName}`);
    // Navigate back to the home view of the current tank
    // The rack is now in a different tank so go to tank list
    await goTankList();
  }catch(e){
    toast('Move failed: ' + e.message, 'err');
  }finally{
    hideLoading();
  }

// =============================================================================
// STEP 1: Pick tank
// =============================================================================
async function mvPickTank(){
  showLoading();
  try{
    const tanks = await api('GET', '/tanks');
    const labels = mvState.mode === 'vial'
      ? ['Tank','Rack','Box','Position']
      : ['Tank','Rack','Slot'];
    const items = tanks.map(t => `
      <div class="wf-select-item" data-mv-tank-id="${t.id}" data-mv-tank-name="${escHtml(t.name)}">
        <div class="wf-select-item-left">
          <div class="wf-select-item-name">${escHtml(t.name)}</div>
        </div>
        <div class="wf-select-item-arrow">›</div>
      </div>`).join('');
    hideLoading();
    openModal(`
      <h2>↦ MOVE — SELECT TANK</h2>
      ${mvStepBar(1, labels)}
      ${mvFromCard()}
      <div class="wf-select-list" id="mv-tank-list">${items}</div>
      <div class="modal-actions"><button class="btn" onclick="closeModal()">CANCEL</button></div>`);

    document.getElementById('mv-tank-list')?.querySelectorAll('[data-mv-tank-id]').forEach(el => {
      el.addEventListener('click', () => {
        mvState.tank = { id: el.dataset.mvTankId, name: el.dataset.mvTankName };
        mvPickRack();
      });
    });
  }catch(e){ hideLoading(); toast(e.message,'err'); }
}

// =============================================================================
// STEP 2: Pick rack
// =============================================================================
async function mvPickRack(){
  showLoading();
  try{
    const racks = await api('GET', `/tanks/${mvState.tank.id}/racks`);
    if(!racks.length){ hideLoading(); toast('No racks in this tank','err'); return; }
    const labels = mvState.mode === 'vial' ? ['Tank','Rack','Box','Position'] : ['Tank','Rack','Slot'];
    const items = racks.map(r => `
      <div class="wf-select-item" data-mv-rack='${JSON.stringify({id:r.id,name:r.name,capacity:r.capacity})}'>
        <div class="wf-select-item-left">
          <div class="wf-select-item-name">${escHtml(r.name)}</div>
          <div class="wf-select-item-sub">${escHtml(r.position||'—')} · ${r.capacity} slots</div>
        </div>
        <div class="wf-select-item-arrow">›</div>
      </div>`).join('');
    hideLoading();
    openModal(`
      <h2>↦ MOVE — SELECT RACK</h2>
      ${mvStepBar(2, labels)}
      ${mvFromCard()}
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:10px">
        Tank: <span style="color:var(--accent)">${escHtml(mvState.tank.name)}</span>
      </div>
      <div class="wf-select-list" id="mv-rack-list">${items}</div>
      <div class="modal-actions"><button class="btn" onclick="mvPickTank()">‹ BACK</button></div>`);

    document.getElementById('mv-rack-list')?.querySelectorAll('[data-mv-rack]').forEach(el => {
      el.addEventListener('click', () => {
        mvState.rack = JSON.parse(el.dataset.mvRack);
        mvState.mode === 'box' ? mvPickSlot() : mvPickBox();
      });
    });
  }catch(e){ hideLoading(); toast(e.message,'err'); }
}

// =============================================================================
// STEP 3a (Box move): Pick slot
// =============================================================================
async function mvPickSlot(){
  showLoading();
  try{
    const boxes  = await api('GET', `/racks/${mvState.rack.id}/boxes`);
    const occupied = new Set(boxes.filter(b => b.id !== mvState.boxId).map(b => b.slot_position));
    hideLoading();

    let slots = '';
    for(let i = 1; i <= mvState.rack.capacity; i++){
      if(occupied.has(i)){
        slots += `<div class="wf-select-item" style="opacity:.45;cursor:not-allowed">
          <div class="wf-select-item-left">
            <div class="wf-select-item-name">Slot ${i}</div>
            <div class="wf-select-item-sub">Occupied</div>
          </div>
        </div>`;
      } else {
        slots += `<div class="wf-select-item" data-mv-slot="${i}">
          <div class="wf-select-item-left">
            <div class="wf-select-item-name">Slot ${i}</div>
            <div class="wf-select-item-sub">Empty — click to move here</div>
          </div>
          <div class="wf-select-item-arrow">›</div>
        </div>`;
      }
    }

    openModal(`
      <h2>↦ MOVE — SELECT SLOT</h2>
      ${mvStepBar(3, ['Tank','Rack','Slot'])}
      ${mvFromCard()}
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:10px">
        ${escHtml(mvState.tank.name)} › <span style="color:var(--accent)">${escHtml(mvState.rack.name)}</span>
      </div>
      <div class="wf-select-list" id="mv-slot-list">${slots}</div>
      <div class="modal-actions"><button class="btn" onclick="mvPickRack()">‹ BACK</button></div>`);

    document.getElementById('mv-slot-list')?.querySelectorAll('[data-mv-slot]').forEach(el => {
      el.addEventListener('click', () => {
        mvState.targetSlot = parseInt(el.dataset.mvSlot, 10);
        mvConfirmBox();
      });
    });
  }catch(e){ hideLoading(); toast(e.message,'err'); }
}

async function mvConfirmBox(){
  openModal(`
    <h2>↦ CONFIRM MOVE</h2>
    ${mvFromCard()}
    <div style="font-family:var(--font-mono);font-size:12px;color:var(--text);margin-bottom:16px">
      Move to: <span style="color:var(--success)">${escHtml(mvState.tank.name)} › ${escHtml(mvState.rack.name)} › Slot ${mvState.targetSlot}</span>

    <div class="modal-actions">
      <button class="btn" onclick="mvPickSlot()">‹ BACK</button>
      <button class="btn btn-success" onclick="doMoveBox()">↦ CONFIRM MOVE</button>

}

async function doMoveBox(){
  try{
    const res = await api('POST', `/boxes/${mvState.boxId}/move`, {

        <div class="wf-select-item-left">

    openModal(`
      <h2>↦ MOVE — SELECT BOX</h2>
      ${mvStepBar(3, ['Tank','Rack','Box','Position'])}
      ${mvFromCard()}
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:10px">
        ${escHtml(mvState.tank.name)} › <span style="color:var(--accent)">${escHtml(mvState.rack.name)}</span>
      </div>

      });

// =============================================================================
// STEP 4 (Vial move): Pick position in the chosen box
// =============================================================================
async function mvPickPosition(){
  showLoading();
  try{
    const { box, vials } = await api('GET', `/boxes/${mvState.box.id}/vials`);
    const occupied = new Set(vials.map(v => `${v.row_index},${v.col_index}`));
    // Also exclude the vial's current position if moving within same box
    const isSameBox = mvState.box.id === mvState.sourceBoxId;

    const rows = box.rows, cols = box.cols;
    let colHtml = `<div class="col-labels-row"><div class="col-label-spacer"></div><div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:4px;flex:1">`;
    for(let c=0;c<cols;c++) colHtml += `<div class="col-label">${colLbl(c)}</div>`;
    colHtml += '</div></div>';

    let gridHtml = '';
    for(let r=0;r<rows;r++){
      gridHtml += `<div class="row-wrap"><div class="row-label">${rowLbl(r)}</div><div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:4px;flex:1">`;
      for(let c=0;c<cols;c++){
        const key = `${r},${c}`;
        const isSource = isSameBox && r === mvState.row && c === mvState.col;
        if(occupied.has(key) && !isSource){
          gridHtml += `<div class="vial occupied" style="cursor:not-allowed;opacity:.5" title="Occupied">●</div>`;
        } else if(isSource){
          gridHtml += `<div class="vial selected" title="Current position (${rowLbl(r)}${colLbl(c)})">↦</div>`;
        } else {
          gridHtml += `<div class="vial" style="cursor:pointer" data-mv-r="${r}" data-mv-c="${c}" title="Move to ${rowLbl(r)}${colLbl(c)}"></div>`;
        }
      }
      gridHtml += '</div></div>';
    }

    hideLoading();
    openModal(`
      <h2>↦ MOVE — SELECT POSITION</h2>
      ${mvStepBar(4, ['Tank','Rack','Box','Position'])}
      ${mvFromCard()}
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:10px">
        ${escHtml(mvState.rack.name)} › Slot ${mvState.box.slot} › <span style="color:var(--accent)">${escHtml(box.name)}</span>
      </div>
      <div class="wf-grid-wrap">
        <div class="wf-grid-label">Click an empty cell · ↦ = current · ● = occupied</div>
        ${colHtml}${gridHtml}
      </div>
      <div class="modal-actions"><button class="btn" onclick="mvPickBox()">‹ BACK</button></div>`);

    document.querySelectorAll('[data-mv-r]').forEach(el => {
      el.addEventListener('click', () => {
        mvState.targetRow = parseInt(el.dataset.mvR, 10);
        mvState.targetCol = parseInt(el.dataset.mvC, 10);
        mvConfirmVial();
      });
    });
  }catch(e){ hideLoading(); toast(e.message,'err'); }
}

async function mvConfirmVial(){
  const toPos = `${rowLbl(mvState.targetRow)}${colLbl(mvState.targetCol)}`;
  openModal(`
    <h2>↦ CONFIRM MOVE</h2>
    ${mvFromCard()}
    <div style="font-family:var(--font-mono);font-size:12px;color:var(--text);margin-bottom:16px">
      Move to: <span style="color:var(--success)">${escHtml(mvState.tank.name)} › ${escHtml(mvState.rack.name)} › ${escHtml(mvState.box.name)} › ${toPos}</span>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="mvPickPosition()">‹ BACK</button>
      <button class="btn btn-success" onclick="doMoveVial()">↦ CONFIRM MOVE</button>
    </div>`);
}

async function doMoveVial(){
  try{
    await api('POST', '/vials/move', {
      source_box_id: mvState.sourceBoxId,
      source_row:    mvState.row,
      source_col:    mvState.col,
      target_box_id: mvState.box.id,
      target_row:    mvState.targetRow,
      target_col:    mvState.targetCol,
      changedBy:     getRes()
    });
    const toPos = `${rowLbl(mvState.targetRow)}${colLbl(mvState.targetCol)}`;
    closeModal();
    toast(`"${mvState.vialName}" moved to ${mvState.box.name} › ${toPos}`);

    highlightVial = { r: mvState.targetRow, c: mvState.targetCol };
    selVial       = { r: mvState.targetRow, c: mvState.targetCol };
    await goBox(mvState.rack.id, mvState.box.id);
  }catch(e){ toast(e.message,'err'); }
}

// ============================================================================
// BULK ADD — fill out sample info once, then pick multiple positions
// ============================================================================
//
// Workflow:
//   Step 1: Fill in the sample form (same fields as single add).
//   Step 2: Click empty cells in the vial grid to select positions.
//           Selected cells turn green. Click again to deselect.
//           Occupied cells are shown but not clickable.
//   Step 3: Confirm — the same sample data is saved to every selected position.
//
// The box/vial grid is re-rendered inline inside the modal, not the main view,
// so the user can see what they're selecting without leaving the modal.
// ============================================================================

let _bulkData     = null;   // vial form data from step 1
let _bulkSelected = new Set(); // Set of "row,col" strings picked in step 2

function openBulkAdd(){
  if(!curBox){ toast('Open a box first', 'err'); return; }
  _bulkData     = null;
  _bulkSelected = new Set();
  _renderBulkStep1();
}

function _renderBulkStep1(){
  openModal(`
    <h2>＋ BULK ADD — Step 1 of 2: Sample Info</h2>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:14px">
      Fill in the details once — they will be applied to every position you pick in the next step.
    </div>
    ${vialForm(_bulkData)}
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">CANCEL</button>
      <button class="btn btn-success" onclick="_bulkStep2()">NEXT → PICK POSITIONS</button>
    </div>`);
}

function _bulkStep2(){
  // Capture form values — validate name only
  const data = vialFromForm();
  if(!data.name){ toast('Sample name required', 'err'); return; }
  _bulkData     = data;
  _bulkSelected = new Set();
  _renderBulkStep2();
}

function _renderBulkStep2(){
  const box    = curBox;
  const vials  = curBox._vials || [];
  const occupied = new Set(vials.map(v => `${v.row_index},${v.col_index}`));

  // Column labels
  let colHtml = `<div class="col-labels-row"><div class="col-label-spacer"></div><div style="display:grid;grid-template-columns:repeat(${box.cols},1fr);gap:4px;flex:1">`;
  for(let c=0;c<box.cols;c++) colHtml += `<div class="col-label">${colLbl(c)}</div>`;
  colHtml += '</div></div>';

  // Vial grid
  let gridHtml = '';
  for(let r=0;r<box.rows;r++){
    gridHtml += `<div class="row-wrap"><div class="row-label">${rowLbl(r)}</div><div style="display:grid;grid-template-columns:repeat(${box.cols},1fr);gap:4px;flex:1">`;
    for(let c2=0;c2<box.cols;c2++){
      const key = `${r},${c2}`;
      if(occupied.has(key)){
        gridHtml += `<div class="vial occupied" style="cursor:not-allowed;opacity:.5" title="Occupied">●</div>`;
      } else {
        const sel = _bulkSelected.has(key);
        gridHtml += `<div class="vial${sel?' selected':''}" id="bulk-cell-${r}-${c2}"
          style="cursor:pointer${sel?';background:rgba(0,229,153,.3);border-color:var(--success)':''}"
          onclick="_bulkToggle(${r},${c2})"
          title="${rowLbl(r)}${colLbl(c2)}${sel?' (selected)':' (click to select)'}"></div>`;
      }
    }
    gridHtml += '</div></div>';
  }

  openModal(`
    <h2>＋ BULK ADD — Step 2 of 2: Pick Positions</h2>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:10px">
      Adding: <strong style="color:var(--accent)">${escHtml(_bulkData.name)}</strong>
      ${_bulkData.sample_type ? `· ${escHtml(_bulkData.sample_type)}`:''}
      ${_bulkData.passage     ? `· P${escHtml(_bulkData.passage)}`:''}
    </div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:10px">
      Click empty cells to select. Click again to deselect.
      <span id="bulk-count-label" style="color:var(--success);margin-left:8px">0 selected</span>
    </div>
    <div class="wf-grid-wrap">
      <div class="wf-grid-label">● = occupied &nbsp; click empty cell = select</div>
      ${colHtml}${gridHtml}
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="_renderBulkStep1()">‹ BACK</button>
      <button class="btn btn-danger" onclick="_bulkClearAll()">✕ CLEAR</button>
      <button class="btn btn-success" id="btn-bulk-confirm" onclick="_bulkConfirm()" disabled>
        ＋ ADD <span id="bulk-confirm-count">0</span> TUBES
      </button>
    </div>`);
}

function _bulkToggle(r, c){
  const key  = `${r},${c}`;
  const cell = document.getElementById(`bulk-cell-${r}-${c}`);
  if(!cell) return;

  if(_bulkSelected.has(key)){
    _bulkSelected.delete(key);
    cell.classList.remove('selected');
    cell.style.background    = '';
    cell.style.borderColor   = '';
    cell.title = `${rowLbl(r)}${colLbl(c)} (click to select)`;
  } else {
    _bulkSelected.add(key);
    cell.classList.add('selected');
    cell.style.background    = 'rgba(0,229,153,.3)';
    cell.style.borderColor   = 'var(--success)';
    cell.title = `${rowLbl(r)}${colLbl(c)} (selected)`;
  }
  _bulkUpdateCount();
}

function _bulkClearAll(){
  _bulkSelected.forEach(key => {
    const [r,c] = key.split(',');
    const cell  = document.getElementById(`bulk-cell-${r}-${c}`);
    if(cell){ cell.classList.remove('selected'); cell.style.background=''; cell.style.borderColor=''; }
  });
  _bulkSelected.clear();
  _bulkUpdateCount();
}

function _bulkUpdateCount(){
  const n = _bulkSelected.size;
  const lbl = document.getElementById('bulk-count-label');
  const cnt = document.getElementById('bulk-confirm-count');
  const btn = document.getElementById('btn-bulk-confirm');
  if(lbl) lbl.textContent = `${n} selected`;
  if(cnt) cnt.textContent = n;
  if(btn) btn.disabled    = n === 0;
}

async function _bulkConfirm(){
  if(_bulkSelected.size === 0){ toast('No positions selected', 'err'); return; }
  const btn = document.getElementById('btn-bulk-confirm');
  if(btn){ btn.disabled = true; btn.textContent = '⏳ Saving…'; }

  let saved = 0, failed = 0;
  const positions = [..._bulkSelected].map(k => k.split(',').map(Number));

  for(const [r,c] of positions){
    try{
      await api('PUT', `/boxes/${curBox.id}/vials/${r}/${c}`, { ..._bulkData, changedBy: getRes() });
      saved++;
    }catch(e){
      failed++;
      console.warn(`Bulk add failed at ${rowLbl(r)}${colLbl(c)}:`, e.message);
    }
  }

  closeModal();

  if(failed === 0){
    toast(`${saved} tube${saved!==1?'s':''} added`);
  } else {
    toast(`${saved} added, ${failed} failed — check console`, 'info');
  }

  // Refresh the box view
  const { box, vials } = await api('GET', `/boxes/${curBox.id}/vials`);
  curBox = box; curBox._vials = vials;
  renderBox();
}

// ============================================================================
// AUTO-FILL RACK — place boxes in all empty slots with sequential names
// ============================================================================
// Opens a modal where the operator sets:
//   • Name prefix  (default: BOX)
//   • Grid format  (same options as single add)
//   • Starting number (auto-detected from existing boxes, can override)
// Then creates boxes in every empty slot from top to bottom.
// ============================================================================

async function openAutoFillRack(rackId, capacity){
  const boxes    = await api('GET', `/racks/${rackId}/boxes`).catch(()=>[]);
  const occupied = new Set(boxes.map(b => b.slot_position));
  const freeSlots = [];
  for(let i = 1; i <= capacity; i++) if(!occupied.has(i)) freeSlots.push(i);

  if(!freeSlots.length){ toast('All slots are already occupied','err'); return; }

  // Detect the highest existing BOX-NNN number so we can continue the sequence
  const existingNums = boxes
    .map(b => { const m = b.name.match(/(\d+)$/); return m ? parseInt(m[1],10) : 0; })
    .filter(n => n > 0);
  const nextNum = existingNums.length ? Math.max(...existingNums) + 1 : 1;

  openModal(`
    <h2>⊞ AUTO-FILL RACK</h2>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:14px;line-height:1.8">
      ${freeSlots.length} empty slot${freeSlots.length!==1?'s':''} will be filled
      (slot${freeSlots.length!==1?'s':''} ${freeSlots.join(', ')}).
      Boxes are named sequentially from top to bottom.
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Name Prefix</label>
        <input class="form-input" id="af-prefix" value="BOX" placeholder="BOX"/>
        <div class="form-hint">e.g. "BOX" → BOX-001, BOX-002…</div>
      </div>
      <div class="form-group">
        <label class="form-label">Start Number</label>
        <input class="form-input" id="af-start" type="number" min="1" value="${nextNum}"/>
        <div class="form-hint">Next available: ${nextNum}</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Number padding</label>
      <select class="form-select" id="af-pad">
        <option value="3">3 digits — BOX-001</option>
        <option value="2">2 digits — BOX-01</option>
        <option value="1">No padding — BOX-1</option>
      </select>
    </div>
    ${boxSizeFields(9, 9)}
    <div style="font-family:var(--font-mono);font-size:11px;background:var(--surface2);border:1px solid var(--border);padding:10px 12px;border-radius:var(--radius);margin-top:12px">
      <span style="color:var(--muted)">Preview: </span>
      <span id="af-preview" style="color:var(--accent)"></span>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">CANCEL</button>
      <button class="btn btn-success" onclick="doAutoFill('${rackId}')">⊞ FILL ${freeSlots.length} SLOT${freeSlots.length!==1?'S':''}</button>
    </div>`);

  // Live preview updater
  function updatePreview(){
    const prefix = document.getElementById('af-prefix')?.value.trim() || 'BOX';
    const start  = parseInt(document.getElementById('af-start')?.value, 10) || 1;
    const pad    = parseInt(document.getElementById('af-pad')?.value, 10) || 3;
    const fmt    = n => `${prefix}-${String(n).padStart(pad, '0')}`;
    const names  = freeSlots.slice(0, 3).map((_,i) => fmt(start + i));
    if(freeSlots.length > 3) names.push('…');
    const el = document.getElementById('af-preview');
    if(el) el.textContent = names.join(', ');
  }
  updatePreview();
  ['af-prefix','af-start','af-pad'].forEach(id => {
    document.getElementById(id)?.addEventListener('input', updatePreview);
  });
  document.getElementById('af-pad')?.addEventListener('change', updatePreview);
}

async function doAutoFill(rackId){
  const prefix   = document.getElementById('af-prefix')?.value.trim() || 'BOX';
  const startNum = parseInt(document.getElementById('af-start')?.value, 10) || 1;
  const pad      = parseInt(document.getElementById('af-pad')?.value, 10) || 3;
  const { rows, cols } = getBoxDims();
  const fmt = n => `${prefix}-${String(n).padStart(pad, '0')}`;

  // Get current empty slots at execute time (may have changed since modal opened)
  const rack     = await api('GET', `/racks/${rackId}`);
  const boxes    = await api('GET', `/racks/${rackId}/boxes`).catch(()=>[]);
  const occupied = new Set(boxes.map(b => b.slot_position));
  const freeSlots = [];
  for(let i = 1; i <= rack.capacity; i++) if(!occupied.has(i)) freeSlots.push(i);

  if(!freeSlots.length){ closeModal(); toast('No empty slots — rack is full','err'); return; }

  closeModal();
  showLoading();

  let created = 0, failed = 0;
  for(let i = 0; i < freeSlots.length; i++){
    const slot = freeSlots[i];
    const name = fmt(startNum + i);
    try{
      await api('POST', `/racks/${rackId}/boxes`, {
        name, slot_position: slot, rows, cols,
        qr_code: null, notes: '', changedBy: getRes()
      });
      created++;
    }catch(e){
      console.warn(`Auto-fill: failed slot ${slot} (${name}):`, e.message);
      failed++;
    }
  }

  hideLoading();
  toast(`Auto-fill complete: ${created} box${created!==1?'es':''} created${failed?`, ${failed} failed`:''}`);
  await renderRack();
}

// ============================================================================
// QUICK VIAL ACTIONS — available at rack and box level
// ============================================================================

// ＋ VIAL at rack level: pick a box, then add to the first empty cell
async function quickAddVial(){
  if(!curRack){ toast('No rack selected', 'err'); return; }
  const boxes = await api('GET', `/racks/${curRack.id}/boxes`).catch(()=>[]);
  if(!boxes.length){ toast('No boxes in this rack — place a box first', 'err'); return; }

  // Find boxes that have at least one empty cell
  const available = [];
  for(const b of boxes){
    const {vials} = await api('GET', `/boxes/${b.id}/vials`).catch(()=>({vials:[]}));
    const used = vials.filter(v=>!v.archived_at).length;
    const cap  = b.rows * b.cols;
    if(used < cap) available.push({ ...b, used, cap });
  }
  if(!available.length){ toast('All boxes in this rack are full', 'err'); return; }

  const opts = available.map(b =>
    `<option value="${b.id}">${escHtml(b.name)} (${b.used}/${b.cap} used)</option>`
  ).join('');

  openModal(`
    <h2>＋ VIAL — Quick Add</h2>
    <div class="form-group">
      <label class="form-label">Select Box</label>
      <select class="form-select" id="qa-box-sel">${opts}</select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">CANCEL</button>
      <button class="btn btn-success" onclick="quickAddVialToBox()">NEXT →</button>
    </div>`);
}

async function quickAddVialToBox(){
  const sel = document.getElementById('qa-box-sel');
  if(!sel) return;
  const boxId = sel.value;
  const {box, vials} = await api('GET', `/boxes/${boxId}/vials`).catch(()=>({box:null,vials:[]}));
  if(!box){ toast('Box not found', 'err'); return; }

  // Find first empty cell (row-major order)
  const occupied = new Set(vials.filter(v=>!v.archived_at).map(v=>`${v.row_index},${v.col_index}`));
  let firstR = null, firstC = null;
  outer: for(let r=0; r<box.rows; r++){
    for(let c=0; c<box.cols; c++){
      if(!occupied.has(`${r},${c}`)){ firstR=r; firstC=c; break outer; }
    }
  }
  if(firstR === null){ toast('Box is full', 'err'); return; }

  curBox = box; curBox._vials = vials;
  closeModal();
  openAddVial(firstR, firstC);
}

// ＋ VIAL at box level: add to first empty cell
function quickAddVialBox(){
  if(!curBox){ toast('No box open', 'err'); return; }
  const occupied = new Set((curBox._vials||[]).filter(v=>!v.archived_at).map(v=>`${v.row_index},${v.col_index}`));
  for(let r=0; r<curBox.rows; r++){
    for(let c=0; c<curBox.cols; c++){
      if(!occupied.has(`${r},${c}`)){ openAddVial(r,c); return; }
    }
  }
  toast('Box is full — no empty positions', 'err');
}

// ✕ VIAL at rack or box level: find by code then confirm delete
function quickDeleteVial(){
  openModal(`
    <h2>✕ VIAL — Quick Delete</h2>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:14px">
      Enter the vial's QR/barcode value to look it up and delete it.
    </div>
    <div class="form-group">
      <label class="form-label">Code Value</label>
      <div class="scan-row">
        <input class="form-input" id="qd-code" placeholder="Scan or type code…" autofocus/>
        <button class="btn btn-qr" onclick="openQRScanner('qd-code')">▦ SCAN</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">CANCEL</button>
      <button class="btn btn-danger" onclick="quickDeleteVialLookup()">FIND & DELETE</button>
    </div>`);
}

async function quickDeleteVialLookup(){
  const code = (document.getElementById('qd-code')?.value||'').trim();
  if(!code){ toast('Enter a code value', 'err'); return; }
  try{
    const vial = await api('GET', `/vials/by-qr?code=${encodeURIComponent(code)}`);
    if(!vial || !vial.id){ toast('Vial not found', 'err'); return; }
    closeModal();
    // Re-use the existing confirmRemoveVial flow by navigating to the vial's box
    const {box, vials} = await api('GET', `/boxes/${vial.box_id}/vials`);
    curBox = box; curBox._vials = vials;
    if(!curRack || curRack.id !== box.rack_id) curRack = await api('GET', `/racks/${box.rack_id}`);
    view = 'box';
    updateBreadcrumb();
    renderBox();
    // Trigger delete confirmation
    selVial = { r: vial.row_index, c: vial.col_index };
    confirmRemoveVial(vial.row_index, vial.col_index);
  }catch(e){
    toast('Not found: ' + e.message, 'err');
  }
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
init();
</script>
