<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CryoVault</title>
<script src="/html5-qrcode.min.js"
  onerror="console.error('html5-qrcode failed to load')"></script>
<script src="/qrcode.min.js"
  onerror="console.error('qrcode failed to load from /qrcode.min.js')"></script>

<!-- Google Fonts: all font options pre-loaded so switching is instant -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Fira+Code:wght@400;500&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet"/>

<style>
/* ==========================================================================
   CSS CUSTOM PROPERTIES — the entire visual system lives here.
   Every colour, font, and spacing value is a variable. The settings system
   works by swapping these variables on :root at runtime; no component-level
   styles need to change.
   ========================================================================== */
:root {
  /* ── Active theme colours (overwritten by JS on load) ─────────────────── */
  --bg:       #070d14;
  --surface:  #0d1a26;
  --surface2: #112030;
  --border:   #1a3a55;
  --accent:   #00c8ff;
  --accent2:  #0077aa;
  --warn:     #ff9500;
  --danger:   #ff3b55;
  --success:  #00e599;
  --text:     #cde8ff;
  --muted:    #5a8aaa;
  --purple:   #a07fff;

  /* ── Typography (overwritten by JS on load) ──────────────────────────── */
  --font-mono:  'Share Tech Mono', monospace;
  --font-sans:  'Rajdhani', sans-serif;
  --font-size-base: 15px;    /* body base size */
  --font-size-sm:   12px;    /* mono labels, meta */
  --font-size-xs:   10px;    /* micro labels */
  --line-height: 1.5;

  /* ── Spacing / density ───────────────────────────────────────────────── */
  --space-xs:  4px;
  --space-sm:  8px;
  --space-md:  14px;
  --space-lg:  22px;
  --space-xl:  36px;

  /* ── Corner radius ────────────────────────────────────────────────────── */
  --radius:    2px;   /* 0 = sharp, 4 = slightly rounded, 8 = rounded */

  /* ── Card / slot height ───────────────────────────────────────────────── */
  --slot-min-height: 68px;

  /* ── Scanline overlay intensity ──────────────────────────────────────── */
  --scanline-opacity: 0.012;

  /* ── Accent glow (used on logo, focused inputs, selected vials) ──────── */
  --glow-color: rgba(0,200,255,0.45);
}

/* ==========================================================================
   THEME DEFINITIONS
   Each theme is a data-theme attribute on <html>. JS sets this attribute and
   the cascade takes care of the rest. Variables that are unchanged between
   themes don't need to be repeated.
   ========================================================================== */

/* Default / CryoBlue — already set in :root above */

[data-theme="midnight"] {
  --bg:       #08070f;
  --surface:  #111020;
  --surface2: #181530;
  --border:   #2a2460;
  --accent:   #9b7dff;
  --accent2:  #5a3fbf;
  --warn:     #f0a030;
  --danger:   #ff4466;
  --success:  #33ddaa;
  --text:     #ddd8ff;
  --muted:    #6860a0;
  --purple:   #c09fff;
  --glow-color: rgba(155,125,255,0.4);
}

[data-theme="biohazard"] {
  --bg:       #070f07;
  --surface:  #0a1a0a;
  --surface2: #0f230f;
  --border:   #1a3f1a;
  --accent:   #39ff14;
  --accent2:  #1a8a00;
  --warn:     #ffcc00;
  --danger:   #ff3300;
  --success:  #00ffcc;
  --text:     #c8ffcc;
  --muted:    #4a8a4a;
  --purple:   #aaff77;
  --glow-color: rgba(57,255,20,0.4);
}

[data-theme="amber"] {
  --bg:       #0e0900;
  --surface:  #1a1200;
  --surface2: #241900;
  --border:   #3d2800;
  --accent:   #ffb000;
  --accent2:  #995500;
  --warn:     #ff6600;
  --danger:   #ff2200;
  --success:  #88ff44;
  --text:     #ffe8b0;
  --muted:    #8a6a30;
  --purple:   #ff88cc;
  --glow-color: rgba(255,176,0,0.4);
}

[data-theme="light"] {
  --bg:       #f4f6f9;
  --surface:  #ffffff;
  --surface2: #eef1f6;
  --border:   #ccd4e0;
  --accent:   #0077cc;
  --accent2:  #0055aa;
  --warn:     #e07000;
  --danger:   #cc2244;
  --success:  #008844;
  --text:     #1a2a3a;
  --muted:    #6678888;
  --purple:   #7744cc;
  --glow-color: rgba(0,119,204,0.25);
  --scanline-opacity: 0; /* no scanlines on light theme */
}

[data-theme="highcontrast"] {
  --bg:       #000000;
  --surface:  #0a0a0a;
  --surface2: #141414;
  --border:   #ffffff44;
  --accent:   #ffffff;
  --accent2:  #cccccc;
  --warn:     #ffff00;
  --danger:   #ff0000;
  --success:  #00ff00;
  --text:     #ffffff;
  --muted:    #aaaaaa;
  --purple:   #ff88ff;
  --glow-color: rgba(255,255,255,0.3);
}

/* CryoBlue HC — same hue as default but much higher contrast text/borders */
[data-theme="cryohc"] {
  --bg:       #000d18;
  --surface:  #001a2e;
  --surface2: #002440;
  --border:   #006699;
  --accent:   #00eeff;
  --accent2:  #00aacc;
  --warn:     #ffcc00;
  --danger:   #ff4466;
  --success:  #00ff99;
  --text:     #ffffff;
  --muted:    #88ccdd;
  --purple:   #cc99ff;
  --glow-color: rgba(0,238,255,0.5);
}

/* Light Warm — soft cream background, warm brown accents */
[data-theme="lightwarm"] {
  --bg:       #faf8f4;
  --surface:  #ffffff;
  --surface2: #f2ede4;
  --border:   #d8cfc0;
  --accent:   #8b5e3c;
  --accent2:  #6b4226;
  --warn:     #d97706;
  --danger:   #c0392b;
  --success:  #2e7d32;
  --text:     #1a1208;
  --muted:    #7a6652;
  --purple:   #6b3fa0;
  --glow-color: rgba(139,94,60,0.2);
  --scanline-opacity: 0;
}

/* Light Cool — clean white with teal/slate accents, clinical feel */
[data-theme="lightcool"] {
  --bg:       #f0f4f8;
  --surface:  #ffffff;
  --surface2: #e4edf5;
  --border:   #b8cfe0;
  --accent:   #0369a1;
  --accent2:  #075985;
  --warn:     #b45309;
  --danger:   #be123c;
  --success:  #065f46;
  --text:     #0f172a;
  --muted:    #4a6070;
  --purple:   #5b21b6;
  --glow-color: rgba(3,105,161,0.2);
  --scanline-opacity: 0;
}

/* ==========================================================================
   DENSITY MODES
   Density is applied via a data-density attribute on <html>.
   It scales the spacing variables and slot height, leaving all other
   styles unchanged.
   ========================================================================== */
[data-density="compact"] {
  --space-xs:  2px;
  --space-sm:  5px;
  --space-md:  10px;
  --space-lg:  16px;
  --space-xl:  24px;
  --slot-min-height: 52px;
}
[data-density="comfortable"] {
  --space-xs:  6px;
  --space-sm:  12px;
  --space-md:  18px;
  --space-lg:  28px;
  --space-xl:  48px;
  --slot-min-height: 84px;
}

/* ==========================================================================
   BASE STYLES — use variables throughout, never hard-coded colours.
   ========================================================================== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  background:   var(--bg);
  color:        var(--text);
  font-family:  var(--font-sans);
  font-size:    var(--font-size-base);
  line-height:  var(--line-height);
  min-height:   100vh;
  overflow-x:   hidden;
  transition:   background .25s, color .25s;
}

/* Scanline overlay — purely cosmetic CRT effect */
body::before {
  content:'';
  position:fixed;inset:0;
  background: repeating-linear-gradient(
    0deg,
    transparent, transparent 2px,
    rgba(0,200,255,var(--scanline-opacity)) 2px,
    rgba(0,200,255,var(--scanline-opacity)) 4px
  );
  pointer-events:none;
  z-index:9999;
}

/* ── HEADER ─────────────────────────────────────────────────────────────── */
header{
  display:flex;align-items:center;gap:12px;
  padding:10px var(--space-lg);
  border-bottom:1px solid var(--border);
  background:var(--surface);
  position:sticky;top:0;z-index:200;
  flex-wrap:wrap;
  transition:background .25s,border-color .25s;
}
.logo{
  font-family:var(--font-mono);
  font-size:18px;color:var(--accent);
  letter-spacing:2px;
  text-shadow:0 0 12px var(--glow-color);
  white-space:nowrap;flex-shrink:0;
}
.logo span{color:var(--muted);font-size:11px;margin-left:8px}

/* ── Search bar ──────────────────────────────────────────────────────────── */
.search-wrap{flex:1;min-width:180px;max-width:480px;position:relative}
.search-input{
  width:100%;
  background:var(--bg);
  border:1px solid var(--border);
  color:var(--text);
  font-family:var(--font-mono);
  font-size:var(--font-size-sm);
  padding:7px 36px 7px 12px;
  outline:none;
  transition:border-color .15s,background .25s;
  border-radius:var(--radius);
}
.search-input:focus{border-color:var(--accent2)}
.search-input::placeholder{color:var(--muted)}
.search-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
.search-count{position:absolute;right:32px;top:50%;transform:translateY(-50%);font-family:var(--font-mono);font-size:10px;color:var(--accent2);display:none}

.header-stats{display:flex;gap:16px;font-family:var(--font-mono);font-size:11px;color:var(--muted);flex-shrink:0}
.header-stats .val{color:var(--accent);font-size:12px}
.header-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}

/* ── Researcher bar ──────────────────────────────────────────────────────── */
.researcher-bar{
  display:flex;align-items:center;gap:10px;
  padding:6px var(--space-lg);
  background:var(--surface2);
  border-bottom:1px solid var(--border);
  font-family:var(--font-mono);font-size:11px;color:var(--muted);
}
.researcher-bar input{
  background:transparent;border:none;
  border-bottom:1px solid var(--border);
  color:var(--accent);font-family:var(--font-mono);
  font-size:11px;padding:2px 6px;outline:none;width:160px;
}

.breadcrumb{
  display:flex;align-items:center;gap:8px;
  padding:10px var(--space-lg);
  font-family:var(--font-mono);font-size:12px;color:var(--muted);
  border-bottom:1px solid var(--border);
}
.crumb{cursor:pointer;color:var(--accent2);transition:color .15s}.crumb:hover{color:var(--accent)}
.sep{color:var(--border)}.bc-active{color:var(--text);cursor:default}

.main{padding:var(--space-lg)}

/* ── Loading / Toast ────────────────────────────────────────────────────── */
.loading-overlay{position:fixed;inset:0;background:rgba(7,13,20,.8);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(2px)}
.loading-spinner{font-family:var(--font-mono);color:var(--accent);font-size:13px;letter-spacing:2px;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.toast-container{position:fixed;bottom:20px;right:20px;z-index:600;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{font-family:var(--font-mono);font-size:11px;padding:10px 16px;border:1px solid;min-width:220px;animation:slideIn .2s ease;border-radius:var(--radius)}
.toast.ok {border-color:var(--success);color:var(--success);background:rgba(0,229,153,.08)}
.toast.err{border-color:var(--danger);color:var(--danger);background:rgba(255,59,85,.08)}
.toast.info{border-color:var(--accent2);color:var(--accent);background:rgba(0,200,255,.06)}
@keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── Buttons ─────────────────────────────────────────────────────────────── */
.btn{
  font-family:var(--font-mono);font-size:11px;letter-spacing:1px;
  padding:6px var(--space-md);
  border:1px solid var(--accent2);background:transparent;color:var(--accent);
  cursor:pointer;transition:all .15s;text-transform:uppercase;white-space:nowrap;
  border-radius:var(--radius);
}
.btn:hover{background:var(--accent2);color:#fff}
.btn-sm{padding:3px 9px;font-size:10px}
.btn-danger{border-color:var(--danger);color:var(--danger)}.btn-danger:hover{background:var(--danger);color:#fff}
.btn-success{border-color:var(--success);color:var(--success)}.btn-success:hover{background:var(--success);color:#000}
.btn-qr{border-color:#7c55ff;color:var(--purple)}.btn-qr:hover{background:#7c55ff;color:#fff}
.btn-settings{border-color:var(--muted);color:var(--muted)}.btn-settings:hover{border-color:var(--accent);color:var(--accent);background:transparent}

/* ── Section layout ──────────────────────────────────────────────────────── */
.section-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:var(--space-md);flex-wrap:wrap;gap:10px}
.section-left .section-title{font-family:var(--font-sans);font-size:20px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.section-left .section-sub{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:2px}
.section-notes{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:5px;white-space:pre-wrap;line-height:1.6;border-left:2px solid var(--border);padding-left:8px}
.section-right{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.hdr-sep{width:1px;height:22px;background:var(--border);flex-shrink:0;margin:0 2px}

/* ── Card grid ────────────────────────────────────────────────────────────── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:var(--space-sm)}
.card{background:var(--surface);border:1px solid var(--border);position:relative;overflow:hidden;transition:border-color .15s,background .25s;border-radius:var(--radius)}
.card-accent{position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent2);transition:background .15s}
.card:hover .card-accent{background:var(--accent)}.card:hover{border-color:var(--accent)}
.card-body{padding:var(--space-md) var(--space-md) 8px;cursor:pointer}
.card-label{font-family:var(--font-mono);font-size:var(--font-size-xs);color:var(--muted);text-transform:uppercase;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.card-title{font-family:var(--font-sans);font-size:17px;font-weight:700;color:var(--text);margin-bottom:8px}
.card-meta{font-family:var(--font-mono);font-size:11px;color:var(--muted);line-height:1.9}
.card-meta .val{color:var(--accent)}
.fill-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:10px}
.fill-bar-inner{height:100%;background:var(--accent);border-radius:2px}
.fill-bar-inner.warn{background:var(--warn)}.fill-bar-inner.full{background:var(--danger)}
.card-actions{display:flex;border-top:1px solid var(--border);background:var(--surface2)}
.ca{flex:1;font-family:var(--font-mono);font-size:10px;padding:6px 2px;text-align:center;cursor:pointer;color:var(--muted);transition:all .15s;border:none;background:transparent;text-transform:uppercase}
.ca:not(:last-child){border-right:1px solid var(--border)}
.ca:hover{background:var(--surface);color:var(--accent)}.ca.del:hover{background:rgba(255,59,85,.15);color:var(--danger)}.ca.qr:hover{background:rgba(124,85,255,.15);color:var(--purple)}

/* ── Rack / slot ─────────────────────────────────────────────────────────── */
.rack-column{display:flex;flex-direction:column;gap:0;border:1px solid var(--border);max-width:680px;border-radius:var(--radius)}
.slot-row{display:flex;align-items:stretch;border-bottom:1px solid var(--border);min-height:var(--slot-min-height);transition:background .12s}
.slot-row:last-child{border-bottom:none}
.slot-num{width:48px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:13px;font-weight:bold;color:var(--muted);border-right:1px solid var(--border);background:linear-gradient(180deg,var(--surface2) 0%,rgba(13,26,38,.6) 100%)}
.slot-row.occupied .slot-num{color:var(--accent2)}.slot-row.occupied{cursor:pointer}
.slot-row.occupied:hover{background:var(--surface2)}.slot-row.occupied:hover .slot-num{color:var(--accent)}
.slot-content{flex:1;display:flex;align-items:center;padding:10px var(--space-md);gap:var(--space-md)}
.slot-box-name{font-family:var(--font-sans);font-size:16px;font-weight:700;color:var(--text);min-width:110px}
.slot-box-meta{font-family:var(--font-mono);font-size:var(--font-size-xs);color:var(--muted);line-height:1.8;flex:1}
.slot-box-meta .val{color:var(--accent)}
.slot-fill-wrap{width:80px;flex-shrink:0}
.slot-fill-label{font-family:var(--font-mono);font-size:9px;color:var(--muted);margin-bottom:3px;text-align:right}
.slot-fill-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.slot-fill-inner{height:100%;background:var(--accent);border-radius:2px}
.slot-fill-inner.warn{background:var(--warn)}.slot-fill-inner.full{background:var(--danger)}
.slot-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0;opacity:0;transition:opacity .15s}.slot-row:hover .slot-actions{opacity:1}
.slot-row.empty{background:var(--bg)}.slot-row.empty:hover{background:var(--surface)}
.slot-empty-label{font-family:var(--font-mono);font-size:11px;color:var(--border);flex:1;letter-spacing:1px}.slot-row.empty:hover .slot-empty-label{color:var(--muted)}
.rack-legend{display:flex;gap:16px;align-items:center;margin-bottom:12px;font-family:var(--font-mono);font-size:11px;color:var(--muted)}
.rack-legend .leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.rack-top-label,.rack-bottom-label{font-family:var(--font-mono);font-size:10px;color:var(--muted);padding:4px var(--space-md);border:1px solid var(--border);display:inline-block;background:var(--surface2);letter-spacing:1px}
.rack-top-label{border-bottom:none}.rack-bottom-label{border-top:none}

/* ── Vial grid ───────────────────────────────────────────────────────────── */
.box-view{display:flex;gap:var(--space-lg);flex-wrap:wrap;align-items:flex-start}
.vial-grid-wrap{flex:0 0 auto;max-width:100%}
.col-labels-row{display:flex;margin-bottom:4px}
.col-label-spacer{width:22px;flex-shrink:0}
.col-label{font-family:var(--font-mono);font-size:9px;color:var(--muted);text-align:center}
.row-wrap{display:flex;align-items:center;gap:4px;margin-bottom:4px}
.row-label{font-family:var(--font-mono);font-size:9px;color:var(--muted);width:20px;text-align:right;flex-shrink:0}
.vial{aspect-ratio:1;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;font-size:7px;font-family:var(--font-mono);color:var(--muted);border-radius:var(--radius);min-width:18px;min-height:18px;position:relative}
.vial.occupied{background:rgba(0,120,180,.25);border-color:var(--accent2);color:var(--accent)}
.vial.has-qr::after{content:'▦';position:absolute;top:1px;right:1px;font-size:5px;color:var(--purple);line-height:1}
.vial.selected{border-color:var(--accent);background:rgba(0,200,255,.2);box-shadow:0 0 8px var(--glow-color)}
.vial.highlighted{border-color:var(--warn);background:rgba(255,149,0,.2);box-shadow:0 0 8px rgba(255,149,0,.4)}
.vial:hover{border-color:var(--accent);background:rgba(0,200,255,.1)}
.legend{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:10px;color:var(--muted)}
.legend-box{width:12px;height:12px;border:1px solid;border-radius:2px}
.info-panel{background:var(--surface);border:1px solid var(--border);padding:var(--space-md);min-width:220px;max-width:260px;flex:0 0 240px;border-radius:var(--radius)}
.info-panel h3{font-family:var(--font-mono);font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.info-field{margin-bottom:9px}
.info-label{font-family:var(--font-mono);font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:2px}
.info-value{font-family:var(--font-mono);font-size:12px;color:var(--text);word-break:break-all}
.info-actions{display:flex;flex-direction:column;gap:5px;margin-top:10px}

/* ── Forms ───────────────────────────────────────────────────────────────── */
.form-group{margin-bottom:11px}
.form-label{font-family:var(--font-mono);font-size:var(--font-size-xs);color:var(--muted);text-transform:uppercase;display:block;margin-bottom:3px}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:var(--font-size-sm);padding:6px 9px;outline:none;transition:border-color .15s,background .25s;border-radius:var(--radius)}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent2)}
.form-textarea{resize:vertical;min-height:50px}
.form-select option{background:var(--surface)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.scan-row{display:flex;gap:6px}.scan-row .form-input{flex:1}
.qr-hint{font-family:var(--font-mono);font-size:10px;color:var(--purple);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.form-hint{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:3px}

/* ── Modal ───────────────────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px}
.modal{background:var(--surface);border:1px solid var(--accent2);padding:var(--space-lg);width:420px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 0 30px rgba(0,200,255,.15);border-radius:var(--radius)}
.modal h2{font-family:var(--font-mono);font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.badge{font-family:var(--font-mono);font-size:9px;padding:2px 7px;border:1px solid;border-radius:2px;display:inline-block}
.badge-ok{border-color:var(--success);color:var(--success)}.badge-warn{border-color:var(--warn);color:var(--warn)}.badge-full{border-color:var(--danger);color:var(--danger)}
.tag{display:inline-block;background:rgba(0,120,180,.2);border:1px solid var(--accent2);color:var(--accent);font-family:var(--font-mono);font-size:10px;padding:1px 6px;border-radius:2px}
.qr-badge{display:inline-block;background:rgba(124,85,255,.18);border:1px solid #7c55ff;color:var(--purple);font-family:var(--font-mono);font-size:9px;padding:1px 6px;border-radius:2px;margin-left:5px}
.empty-state{font-family:var(--font-mono);font-size:12px;color:var(--muted);padding:var(--space-xl);text-align:center;border:1px dashed var(--border);border-radius:var(--radius)}
.confirm-box{background:var(--surface);border:1px solid var(--danger);padding:var(--space-lg);width:340px;max-width:100%;box-shadow:0 0 30px rgba(255,59,85,.2);border-radius:var(--radius)}
.confirm-box h2{font-family:var(--font-mono);font-size:12px;color:var(--danger);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.confirm-box p{font-family:var(--font-mono);font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:16px}

/* ── Search results ──────────────────────────────────────────────────────── */
.search-header{margin-bottom:18px}
.search-header .search-title{font-family:var(--font-sans);font-size:20px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.search-header .search-sub{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:2px}
.search-filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-pill{font-family:var(--font-mono);font-size:10px;letter-spacing:1px;padding:4px 12px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;text-transform:uppercase;border-radius:var(--radius)}
.filter-pill:hover{border-color:var(--accent2);color:var(--accent)}.filter-pill.active{background:var(--accent2);border-color:var(--accent2);color:#fff}
.filter-pill .pill-count{margin-left:5px;opacity:.7}
.results-section{margin-bottom:28px}
.results-section-title{font-family:var(--font-mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.results-section-title .count-badge{font-size:10px;padding:1px 7px;border:1px solid;border-radius:2px}
.rack-count-badge{border-color:var(--accent2);color:var(--accent)}.box-count-badge{border-color:var(--warn);color:var(--warn)}.vial-count-badge{border-color:var(--success);color:var(--success)}
.result-card{display:flex;align-items:center;gap:var(--space-md);padding:12px var(--space-md);background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all .12s;margin-bottom:6px;border-radius:var(--radius)}
.result-card:hover{border-color:var(--accent);background:var(--surface2)}
.result-icon{width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;font-weight:bold;border:1px solid;border-radius:var(--radius);flex-shrink:0}
.result-icon.rack{border-color:var(--accent2);color:var(--accent);background:rgba(0,120,180,.15)}.result-icon.box{border-color:var(--warn);color:var(--warn);background:rgba(255,149,0,.1)}.result-icon.vial{border-color:var(--success);color:var(--success);background:rgba(0,229,153,.1)}
.result-body{flex:1;min-width:0}
.result-name{font-family:var(--font-sans);font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-path{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-archived-badge{font-family:var(--font-mono);font-size:9px;padding:1px 5px;border:1px solid var(--muted);color:var(--muted);border-radius:2px;vertical-align:middle;letter-spacing:1px}
.result-card-archived{opacity:0.6;cursor:default}
.result-card-archived:hover{border-color:var(--border)!important;background:var(--surface)!important}
.result-match{font-family:var(--font-mono);font-size:10px;color:var(--accent2);margin-top:3px}
.result-match mark{background:rgba(0,200,255,.2);color:var(--accent);border-radius:2px;padding:0 2px}
.result-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.result-arrow{color:var(--muted);font-size:14px;transition:color .12s}.result-card:hover .result-arrow{color:var(--accent)}
.search-empty{font-family:var(--font-mono);font-size:13px;color:var(--muted);padding:40px;text-align:center;border:1px dashed var(--border);border-radius:var(--radius)}
.search-empty .search-empty-term{color:var(--text)}.search-empty .search-empty-hint{font-size:11px;margin-top:8px;opacity:.7}

/* ── History ─────────────────────────────────────────────────────────────── */
.history-filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.history-table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:11px}
.history-table th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1px}
.history-table td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top}
.history-table tr:hover td{background:var(--surface2)}
.action-badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:2px;border:1px solid;text-transform:uppercase}
.action-create{border-color:var(--success);color:var(--success)}.action-update{border-color:var(--accent2);color:var(--accent)}.action-delete{border-color:var(--danger);color:var(--danger)}
.diff-old{color:var(--danger);text-decoration:line-through;font-size:10px}.diff-new{color:var(--success);font-size:10px}
.pagination{display:flex;gap:8px;align-items:center;margin-top:16px;font-family:var(--font-mono);font-size:11px;color:var(--muted)}

/* ── QR Scanner ──────────────────────────────────────────────────────────── */
#scanner-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.93);align-items:center;justify-content:center;display:none}
.scanner-box{background:var(--surface);border:1px solid var(--accent);padding:var(--space-lg);width:340px;max-width:95vw;border-radius:var(--radius)}
.scanner-box h2{font-family:var(--font-mono);font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.scanner-video-wrap{position:relative;background:#000;text-align:center;margin-bottom:12px;overflow:hidden}
#qr-reader{width:100%}
.sc-corner{position:absolute;width:20px;height:20px;border-color:var(--accent);border-style:solid}
.sc-tl{top:0;left:0;border-width:2px 0 0 2px}.sc-tr{top:0;right:0;border-width:2px 2px 0 0}.sc-bl{bottom:0;left:0;border-width:0 0 2px 2px}.sc-br{bottom:0;right:0;border-width:0 2px 2px 0}
#scan-status{font-family:var(--font-mono);font-size:11px;text-align:center;margin-bottom:10px;padding:6px;background:var(--bg);color:var(--muted)}
#scan-status.detecting{color:var(--accent);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.qr-display-wrap{text-align:center;padding:14px 0}
.qr-display-wrap .qr-value{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:10px;word-break:break-all;max-width:220px;margin-left:auto;margin-right:auto}

/* ==========================================================================
   SETTINGS VIEW
   ========================================================================== */
.settings-view{max-width:720px}
.settings-section{margin-bottom:28px}
.settings-section-title{
  font-family:var(--font-mono);font-size:11px;color:var(--muted);
  text-transform:uppercase;letter-spacing:2px;
  margin-bottom:14px;padding-bottom:8px;
  border-bottom:1px solid var(--border);
}

/* Swatch grid — for colour scheme selection */
.swatch-grid{display:flex;gap:10px;flex-wrap:wrap}
.swatch{
  width:64px;
  cursor:pointer;
  border:2px solid transparent;
  border-radius:var(--radius);
  overflow:hidden;
  transition:border-color .15s,transform .1s;
}
.swatch:hover{transform:scale(1.05)}
.swatch.active{border-color:var(--accent)}
.swatch-preview{
  height:36px;
  display:flex;gap:2px;padding:4px;
}
.swatch-preview span{flex:1;border-radius:1px}
.swatch-label{
  font-family:var(--font-mono);font-size:9px;color:var(--muted);
  text-align:center;padding:4px 2px;background:var(--surface2);
  line-height:1.2;
}
.swatch.active .swatch-label{color:var(--accent)}

/* Font option cards */
.font-grid{display:flex;gap:10px;flex-wrap:wrap}
.font-card{
  padding:10px 14px;
  border:1px solid var(--border);
  cursor:pointer;transition:all .15s;min-width:140px;
  border-radius:var(--radius);background:var(--surface);
}
.font-card:hover{border-color:var(--accent2)}
.font-card.active{border-color:var(--accent);background:var(--surface2)}
.font-card-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.font-card-sample{font-size:11px;color:var(--muted)}

/* Range sliders */
.settings-slider-row{display:flex;align-items:center;gap:14px}
.settings-slider{
  flex:1;-webkit-appearance:none;appearance:none;
  height:3px;background:var(--border);outline:none;border-radius:2px;cursor:pointer;
}
.settings-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:14px;height:14px;border-radius:50%;
  background:var(--accent);cursor:pointer;border:2px solid var(--bg);
}
.settings-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg)}
.slider-value{font-family:var(--font-mono);font-size:11px;color:var(--accent);min-width:36px;text-align:right}

/* Radius option toggle */
.radius-options{display:flex;gap:8px}
.radius-btn{
  width:44px;height:36px;cursor:pointer;
  border:1px solid var(--border);background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;position:relative;
}
.radius-btn:hover{border-color:var(--accent2)}.radius-btn.active{border-color:var(--accent);background:var(--surface2)}
.radius-btn .r-demo{
  width:20px;height:20px;
  border:2px solid var(--muted);background:transparent;
}

/* Toggle switch */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.toggle-row:last-child{border-bottom:none}
.toggle-label{font-family:var(--font-mono);font-size:11px;color:var(--text)}
.toggle-sub{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:2px}
.toggle-switch{
  width:36px;height:20px;background:var(--border);border-radius:10px;
  cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;
}
.toggle-switch.on{background:var(--accent2)}
.toggle-switch::after{
  content:'';position:absolute;top:3px;left:3px;
  width:14px;height:14px;border-radius:50%;background:#fff;
  transition:transform .2s;
}
.toggle-switch.on::after{transform:translateX(16px)}

/* Density selector */
.density-options{display:flex;gap:8px}
.density-btn{
  padding:8px 16px;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;transition:all .15s;
  font-family:var(--font-mono);font-size:10px;color:var(--muted);
  text-transform:uppercase;letter-spacing:1px;border-radius:var(--radius);
}
.density-btn:hover{border-color:var(--accent2);color:var(--accent)}.density-btn.active{border-color:var(--accent);color:var(--accent);background:var(--surface2)}

/* ==========================================================================
   QR VIAL SCAN WORKFLOW
   The scan workflow is a multi-step modal. Each step replaces the modal
   body content. A step indicator at the top shows progress.
   ========================================================================== */

/* Workflow step indicator */
.wf-steps{
  display:flex;align-items:center;gap:0;
  margin-bottom:18px;padding-bottom:14px;
  border-bottom:1px solid var(--border);
}
.wf-step{
  flex:1;text-align:center;
  font-family:var(--font-mono);font-size:9px;
  color:var(--muted);text-transform:uppercase;letter-spacing:.5px;
  position:relative;
}
.wf-step::before{
  content:'';display:block;
  width:22px;height:22px;border-radius:50%;
  border:1px solid var(--border);background:var(--bg);
  margin:0 auto 5px;
  font-family:var(--font-mono);font-size:10px;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);
}
.wf-step.done::before{
  background:var(--accent2);border-color:var(--accent);color:#fff;
  content:'✓';
}
.wf-step.active::before{
  border-color:var(--accent);color:var(--accent);box-shadow:0 0 8px var(--glow-color);
}
.wf-step-line{width:24px;height:1px;background:var(--border);flex-shrink:0}
.wf-step.done+.wf-step-line{background:var(--accent2)}

/* Found / not-found result cards inside the workflow modal */
.wf-result-card{
  background:var(--surface2);border:1px solid var(--border);
  padding:14px;margin-bottom:14px;border-radius:var(--radius);
}
.wf-result-card.found{border-color:var(--success)}
.wf-result-card.notfound{border-color:var(--warn)}
.wf-result-title{
  font-family:var(--font-mono);font-size:10px;
  text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;
}
.wf-result-card.found .wf-result-title{color:var(--success)}
.wf-result-card.notfound .wf-result-title{color:var(--warn)}
.wf-result-name{
  font-family:var(--font-sans);font-size:17px;font-weight:700;
  color:var(--text);margin-bottom:4px;
}
.wf-result-path{
  font-family:var(--font-mono);font-size:10px;color:var(--muted);
  margin-bottom:8px;
}
.wf-result-meta{
  display:flex;gap:10px;flex-wrap:wrap;
}
.wf-chip{
  font-family:var(--font-mono);font-size:10px;
  padding:2px 8px;border:1px solid var(--border);
  color:var(--muted);border-radius:2px;
}

/* Step: select rack / box / position */
.wf-select-list{
  display:flex;flex-direction:column;gap:6px;
  max-height:260px;overflow-y:auto;
  margin-bottom:14px;
}
.wf-select-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px;
  background:var(--surface2);border:1px solid var(--border);
  cursor:pointer;transition:all .12s;border-radius:var(--radius);
}
.wf-select-item:hover{border-color:var(--accent);background:var(--surface)}
.wf-select-item-disabled{cursor:default;opacity:0.45}
.wf-select-item-disabled:hover{border-color:var(--border);background:var(--surface2)}
.wf-select-item-left{flex:1}
.wf-select-item-name{
  font-family:var(--font-sans);font-size:15px;font-weight:600;color:var(--text);
}
.wf-select-item-sub{
  font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:2px;
}
.wf-select-item-arrow{color:var(--muted);font-size:14px}
.wf-select-item:hover .wf-select-item-arrow{color:var(--accent)}

/* Vial grid inside the position-picker step */
.wf-grid-wrap{margin-bottom:14px}
.wf-grid-label{
  font-family:var(--font-mono);font-size:10px;color:var(--muted);
  margin-bottom:8px;
}
/* Reuse .vial styles — position picker shares the same cell rendering */

/* Live preview panel */
.settings-preview{
  background:var(--surface2);border:1px solid var(--border);
  padding:var(--space-md);margin-top:20px;
  border-radius:var(--radius);
}
.settings-preview-title{font-family:var(--font-mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.preview-chip{display:inline-block;padding:2px 8px;border:1px solid;border-radius:2px;font-family:var(--font-mono);font-size:10px;margin:2px}

/* ==========================================================================
   MOVE MODAL — shared with wf-select styles but needs a distinct look
   for the "current location" breadcrumb shown at each step
   ========================================================================== */
.move-from{
  background:var(--surface2);border:1px solid var(--accent2);
  padding:10px 12px;margin-bottom:14px;border-radius:var(--radius);
  font-family:var(--font-mono);font-size:11px;
}
.move-from-label{color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.move-from-value{color:var(--accent)}
.btn-move{border-color:var(--purple);color:var(--purple)}.btn-move:hover{background:var(--purple);color:#fff}
</style>
</head>
<body>

<header>
  <div class="logo">CRYOVAULT <span>// LN₂</span></div>
  <div class="search-wrap">
    <input class="search-input" id="global-search" type="search" placeholder="Search vials, boxes, racks, QR codes…" autocomplete="off" spellcheck="false"/>
    <span class="search-count" id="search-count"></span>
    <span class="search-icon">⌕</span>
  </div>
  <div class="header-stats">
    <div>TANK <span class="val" id="hdr-tank">—</span></div>
    <div>RACKS <span class="val" id="hdr-racks">—</span></div>
    <div>BOXES <span class="val" id="hdr-boxes">—</span></div>
    <div>VIALS <span class="val" id="hdr-vials">—</span>/<span class="val" id="hdr-cap">—</span></div>
  </div>
  <div class="header-actions">
    <button class="btn btn-settings" onclick="goSettings()" title="Appearance settings">⚙ SETTINGS</button>
    <button class="btn" onclick="goArchive()">🗄 ARCHIVE</button>
    <button class="btn" onclick="goHistory()">⏱ HISTORY</button>
    <button class="btn btn-warn" onclick="openExportModal()">↓ EXPORT</button>
  </div>
</header>

<div class="researcher-bar">
  <span>RESEARCHER:</span>
  <input id="researcher-name" placeholder="Your name (logged with changes)"/>
</div>

<div class="breadcrumb" id="breadcrumb"></div>
<div class="main" id="main-content"></div>
<div class="toast-container" id="toast-container"></div>
<div class="loading-overlay" id="loading" style="display:none"><div class="loading-spinner">LOADING…</div></div>
<div class="modal-overlay" id="modal" style="display:none"><div id="modal-body"></div></div>
<div id="scanner-overlay" style="display:none">
  <div class="scanner-box">
    <h2>▦ SCAN CODE</h2>
    <!-- html5-qrcode inserts the camera feed into #qr-reader automatically -->
    <div id="qr-reader" style="width:100%;margin-bottom:10px"></div>
    <div id="scan-status">Accessing camera…</div>
    <div class="form-group"><label class="form-label">Or enter manually</label><div class="scan-row"><input class="form-input" id="qr-manual" placeholder="Code value…"/><button class="btn btn-success" onclick="useManualQR()">USE</button></div></div>
    <div class="modal-actions"><button class="btn btn-danger" onclick="stopScanner()">CANCEL</button></div>
  </div>
</div>

<script>
// ============================================================================
// SETTINGS SYSTEM
// ============================================================================
// All appearance settings are stored as a plain object in localStorage under
// the key "cryovault_settings". On every page load we read this object and
// apply the settings to the <html> element as data-* attributes and CSS
// custom property overrides.
//
// WHY localStorage?
//   Settings are per-browser-session preferences that have nothing to do with
//   lab data. They don't belong in the server database. localStorage is the
//   correct and conventional place for this, and this code runs in the user's
//   own browser against their own deployed server — not inside a sandboxed
//   Claude artifact.
//
// SETTINGS SCHEMA
//   {
//     theme:       string  — data-theme attribute value
//     fontMono:    string  — CSS font-family for monospace elements
//     fontSans:    string  — CSS font-family for heading/body elements
//     fontSize:    number  — base font size in px (12–20)
//     density:     string  — "compact" | "normal" | "comfortable"
//     radius:      number  — border-radius in px (0 | 4 | 8)

// Read settings from localStorage, merging with defaults so new settings
// added in future versions always have a value.
function loadSettings() {
  try {
    const stored = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
    return { ...DEFAULTS, ...stored };
  } catch {
    return { ...DEFAULTS };
  }
}

function saveSettings(s) {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
}

// Apply all settings to the DOM.
// This is called once on page load and every time a setting changes.
function applySettings(s) {
  const root = document.documentElement;

  // Colour theme — via data-theme attribute picked up by CSS selectors above
  root.setAttribute('data-theme', s.theme === 'default' ? '' : s.theme);

  // Font families — update the CSS custom properties directly
  root.style.setProperty('--font-mono', `'${s.fontMono}', monospace`);
  root.style.setProperty('--font-sans', `'${s.fontSans}', sans-serif`);

  // Base font size — scales the entire UI
  root.style.setProperty('--font-size-base', `${s.fontSize}px`);
  root.style.setProperty('--font-size-sm',   `${Math.round(s.fontSize * 0.8)}px`);
  root.style.setProperty('--font-size-xs',   `${Math.round(s.fontSize * 0.667)}px`);

  // Density — via data-density attribute
  root.setAttribute('data-density', s.density === 'normal' ? '' : s.density);

  // Border radius
  root.style.setProperty('--radius', `${s.radius}px`);

  // Scanline overlay
  root.style.setProperty('--scanline-opacity', s.scanlines ? '0.012' : '0');
}

// Current settings — initialise immediately so styles apply before first render
let settings = loadSettings();
applySettings(settings);

// ── API ───────────────────────────────────────────────────────────────────────
async function api(method,path,body=null){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body) opts.body=JSON.stringify(body);
  const res=await fetch(`${API}/api${path}`,opts);
  if(!res.ok){const e=await res.json().catch(()=>({error:res.statusText}));throw new Error(e.error||res.statusText);}
  return res.json();
}

// ── TANK LIST VIEW ────────────────────────────────────────────────────────────
async function renderTankList(){
  view='tanks';
  showLoading();
  const el=document.getElementById('main-content');
  try{
    const tanks=await api('GET','/tanks');

    // Store tanks in a module-level cache so selectTank(id) can look them up
    // without passing serialised objects through onclick attributes.
    window._tankCache = {};
    for (const t of tanks) window._tankCache[t.id] = t;

    // Header stats from /api/health (global, not per-tank)
    const health=await api('GET','/health').catch(()=>null);
    if(health){
      document.getElementById('hdr-racks').textContent=health.racks;
      document.getElementById('hdr-boxes').textContent=health.boxes;
      document.getElementById('hdr-vials').textContent=health.vials;
    }
    document.getElementById('hdr-tank').textContent=`${tanks.length} tank${tanks.length!==1?'s':''}`;

    let h=`<div class="section-header">
      <div class="section-left">
        <div class="section-title">Tanks</div>
        <div class="section-sub">${tanks.length} LN₂ storage tank${tanks.length!==1?'s':''}</div>
      </div>
      <div class="section-right">
        <button class="btn btn-success" onclick="openAddTank()">＋ ADD TANK</button>
        <div class="hdr-sep"></div>
        <button class="btn btn-qr" onclick="openVialQRScan()">▦ SCAN CODE</button>
      </div>
    </div>`;

    if(!tanks.length){
      h+=`<div class="empty-state">No tanks configured.<br>Click + ADD TANK to create one.</div>`;
    } else {
      h+=`<div class="card-grid">`;
      for(const tank of tanks){
        const racks=await api('GET',`/tanks/${tank.id}/racks`).catch(()=>[]);
        let vialCount=0,capCount=0;
        for(const r of racks){
          const boxes=await api('GET',`/racks/${r.id}/boxes`).catch(()=>[]);
          for(const b of boxes){
            capCount+=b.rows*b.cols;
            const res=await api('GET',`/boxes/${b.id}/vials`).catch(()=>({vials:[]}));
            vialCount+=(res.vials||[]).length;
          }
        }
        const p  = capCount ? Math.round(vialCount/capCount*100) : 0;
        const cl = fillCls(p);
        // Use a data attribute instead of inline onclick — avoids all
        // character-escaping and serialisation issues.
        h+=`<div class="card" data-tankid="${tank.id}">
          <div class="card-accent"></div>
          <div class="card-body">
            <div class="card-label"><span>TANK · ${tank.id.slice(0,8)}</span></div>
            <div class="card-title">${escHtml(tank.name)}</div>
            <div class="card-meta">
              Racks: <span class="val">${racks.length}</span><br>
              Vials: <span class="val">${vialCount}/${capCount}</span> ${badgeHtml(p)}<br>
              Temp: <span class="val">${escHtml(tank.temperature||'—')}</span>
            </div>
            <div class="fill-bar"><div class="fill-bar-inner ${cl}" style="width:${p}%"></div></div>
          </div>
          <div class="card-actions">
            <button class="ca" data-edit-tank="${tank.id}">✎ EDIT</button>
            <button class="ca del" data-del-tank="${tank.id}">✕ DEL</button>
          </div>
        </div>`;
      }
      h+=`</div>`;
    }
    el.innerHTML=h;
    updateBreadcrumb();

    // Wire tank card clicks via event listeners — more reliable than onclick
    // attributes for data that may contain special characters.
    el.querySelectorAll('.card[data-tankid] .card-body').forEach(body => {
      const id = body.closest('[data-tankid]').dataset.tankid;
      body.style.cursor = 'pointer';
      body.addEventListener('click', () => selectTank(id));
    });
    el.querySelectorAll('[data-edit-tank]').forEach(btn => {
      const id  = btn.dataset.editTank;
      const t   = window._tankCache[id];
      btn.addEventListener('click', e => {
        e.stopPropagation();
        openEditTank(id, t.name, t.temperature||'', t.notes||'');
      });
    });
    el.querySelectorAll('[data-del-tank]').forEach(btn => {
      const id = btn.dataset.delTank;
      const t  = window._tankCache[id];
      btn.addEventListener('click', e => {
        e.stopPropagation();
        confirmDeleteTank(id, t.name);
      });
    });
  }catch(e){toast(e.message,'err');el.innerHTML=`<div class="empty-state">Error: ${escHtml(e.message)}</div>`;}
  finally{hideLoading();}
}

function selectTank(id){
  // Look up the full tank object from the cache populated by renderTankList
  curTank = window._tankCache && window._tankCache[id] ? window._tankCache[id] : { id, name: id };
  document.getElementById('hdr-tank').textContent = curTank.name;
  goHome();
}

async function updateTank(id){
  const name=document.getElementById('f-tname').value.trim();
  if(!name){toast('Tank name required','err');return;}
  try{
    await api('PUT',`/tanks/${id}`,{name,temperature:document.getElementById('f-ttemp').value.trim(),notes:document.getElementById('f-tnotes').value.trim()});

    if(curTank&&curTank.id===id){curTank.name=name;document.getElementById('hdr-tank').textContent=name;updateBreadcrumb();}

async function renderRack(){
  showLoading();const el=document.getElementById('main-content');
  try{
    const{rack,slots}=await api('GET',`/racks/${curRack.id}/slots`);curRack=rack;
    const occupied=slots.filter(s=>s.occupied).length;const totalVialCap=slots.filter(s=>s.box).reduce((a,s)=>a+(s.box.rows*s.box.cols),0);const totalVials=slots.filter(s=>s.box).reduce((a,s)=>a+(s.box.vial_count||0),0);const p=totalVialCap?Math.round(totalVials/totalVialCap*100):0;
    let h=`<div class="section-header"><div class="section-left"><div class="section-title">${escHtml(rack.name)}</div><div class="section-sub">RACK · ${escHtml(rack.position||'—')} · ${rack.capacity} slots · ${occupied}/${rack.capacity} boxes · ${totalVials}/${totalVialCap} vials (${p}%)</div>${rack.notes?`<div class="section-notes">${escHtml(rack.notes)}</div>`:''}</div><div class="section-right"><button class="btn btn-success" onclick="openAddBox('${rack.id}',${rack.capacity})">＋ PLACE BOX</button><button class="btn" onclick="openAutoFillRack('${rack.id}',${rack.capacity})">⊞ AUTO-FILL</button><button class="btn btn-move" onclick="openMoveRack('${rack.id}','${jsStr(rack.name)}')">↦ MOVE</button><button class="btn" onclick="openEditRack('${rack.id}','${jsStr(rack.name)}','${jsStr(rack.position||'')}',${rack.capacity},'${jsStr(rack.notes||'')}')">✎ EDIT</button><button class="btn btn-danger" onclick="confirmDeleteRack('${rack.id}','${jsStr(rack.name)}')">✕ DELETE</button><div class="hdr-sep"></div><button class="btn btn-success btn-sm" onclick="quickAddVial()" title="Add vial to a box in this rack">＋ VIAL</button><button class="btn btn-danger btn-sm" onclick="quickDeleteVial()" title="Find and delete a vial by code">✕ VIAL</button></div></div><div class="rack-legend"><div style="display:flex;align-items:center;gap:6px"><div class="leg-dot" style="background:var(--accent2)"></div>Occupied</div><div style="display:flex;align-items:center;gap:6px"><div class="leg-dot" style="background:var(--surface2);border:1px dashed var(--border)"></div>Empty</div><span style="margin-left:auto;color:var(--muted)">↑ slot 1 = top of rack</span></div><div class="rack-top-label">▲ TOP OF RACK</div><div class="rack-column">`;
    for(const slot of slots){
      if(slot.occupied){
        const b=slot.box,cap=b.rows*b.cols,vc=b.vial_count||0,bp=cap?Math.round(vc/cap*100):0,bcl=fillCls(bp);
        const qrInd=b.qr_code?`<span class="qr-badge" title="${escHtml(b.qr_code)}">▦ QR</span>`:'';
        h+=`<div class="slot-row occupied" onclick="goBox('${rack.id}','${b.id}')"><div class="slot-num">${slot.slot_position}</div><div class="slot-content"><div><div class="slot-box-name">${escHtml(b.name)} ${qrInd}</div><div class="slot-box-meta">Grid: <span class="val">${boxSzLbl(b)}</span> &nbsp; Vials: <span class="val">${vc}/${cap}</span>${b.notes?` &nbsp; <span style="color:var(--muted);font-style:italic">${escHtml(b.notes.slice(0,50))}${b.notes.length>50?'…':''}</span>`:''}</div></div><div class="slot-fill-wrap"><div class="slot-fill-label">${bp}%</div><div class="slot-fill-bar"><div class="slot-fill-inner ${bcl}" style="width:${bp}%"></div></div></div><div class="slot-actions" onclick="event.stopPropagation()">${b.qr_code?`<button class="btn btn-sm btn-qr" onclick="showQRModal('${jsStr(b.qr_code)}','${jsStr(b.name)}')">▦ QR</button>`:''}<button class="btn btn-sm" onclick="openEditBox('${rack.id}','${b.id}','${jsStr(b.name)}',${slot.slot_position},${b.rows},${b.cols},'${jsStr(b.qr_code||'')}','${jsStr(b.notes||'')}',${rack.capacity})">✎</button><button class="btn btn-sm btn-move" onclick="openMoveBox('${b.id}','${jsStr(b.name)}',${slot.slot_position})">↦</button><button class="btn btn-sm btn-danger" onclick="confirmDeleteBox('${b.id}','${jsStr(b.name)}',${slot.slot_position})">✕</button></div></div></div>`;

// ── Settings mutators ─────────────────────────────────────────────────────────
function setSetting(key, value){
  settings[key] = value;
  saveSettings(settings);
  applySettings(settings);
  if(view === 'settings') renderSettings();
}

function setFontPair(mono, sans){
  settings.fontMono = mono;
  settings.fontSans = sans;
  saveSettings(settings);
  applySettings(settings);
  if(view === 'settings') renderSettings();
}

function resetSettings(){
  settings = { ...DEFAULTS };
  saveSettings(settings);
  applySettings(settings);
  if(view === 'settings') renderSettings();
  toast('Settings reset to defaults');
}


// ── SEARCH ────────────────────────────────────────────────────────────────────
document.getElementById('global-search').addEventListener('input', e => {
  const q=e.target.value.trim();clearTimeout(searchDebounce);
  const countEl=document.getElementById('search-count');
  if(q.length===0){countEl.style.display='none';if(view==='search'){curTank?goHome():goTankList();}return;}
  if(q.length===1){countEl.textContent='2+ chars';countEl.style.display='block';return;}
  searchDebounce=setTimeout(()=>{runSearch(q);},300);
});
document.getElementById('global-search').addEventListener('keydown',e=>{
  if(e.key==='Escape'){e.target.value='';document.getElementById('search-count').style.display='none';if(view==='search'){curTank?goHome():goTankList();}}
});

async function runSearch(q){
  searchTerm=q;view='search';updateBreadcrumb();showLoading();
  try{const data=await api('GET',`/search?q=${encodeURIComponent(q)}&limit=100`);searchResults=data;renderSearch();const countEl=document.getElementById('search-count');countEl.textContent=data.total;countEl.style.display=data.total?'block':'none';}
  catch(e){toast(e.message,'err');document.getElementById('main-content').innerHTML=`<div class="empty-state">Search error: ${escHtml(e.message)}</div>`;}
  finally{hideLoading();}
}
function renderSearch(){
  const data=searchResults;if(!data) return;
  const{query,results}=data;const rCount=results.racks.length,bCount=results.boxes.length,vCount=results.vials.length,total=rCount+bCount+vCount;
  const showRacks=searchFilter==='all'||searchFilter==='rack',showBoxes=searchFilter==='all'||searchFilter==='box',showVials=searchFilter==='all'||searchFilter==='vial';
  const el=document.getElementById('main-content');
  if(total===0){el.innerHTML=`<div class="search-header"><div class="search-title">Search Results</div><div class="search-sub">0 results for "${escHtml(query)}"</div></div><div class="search-empty"><div>No matches for <span class="search-empty-term">"${escHtml(query)}"</span></div><div class="search-empty-hint">Try a different term, or search by QR code, researcher, or sample type.</div></div>`;return;}
  const pills=[{key:'all',label:'All',count:total},{key:'rack',label:'Racks',count:rCount},{key:'box',label:'Boxes',count:bCount},{key:'vial',label:'Vials',count:vCount}].map(p=>p.count>0?`<button class="filter-pill ${searchFilter===p.key?'active':''}" onclick="setSearchFilter('${p.key}')">${p.label}<span class="pill-count">${p.count}</span></button>`:'').join('');
  let html=`<div class="search-header"><div class="search-title">Search Results</div><div class="search-sub">${total} result${total!==1?'s':''} for "${escHtml(query)}"</div></div><div class="search-filters">${pills}</div>`;
  if(showRacks&&rCount>0){html+=`<div class="results-section"><div class="results-section-title">Racks <span class="count-badge rack-count-badge">${rCount}</span></div>`;for(const rack of results.racks){const fl=FIELD_LABELS[rack._match_field]||rack._match_field;const archBadge=rack._archived?'<span class="search-archived-badge">ARCHIVED</span>':'';const rackClick=rack._archived?'':(`goRack('${rack.id}')`);html+=`<div class="result-card${rack._archived?' result-card-archived':''}" onclick="${rackClick}"><div class="result-icon rack">RK</div><div class="result-body"><div class="result-name">${highlight(rack.name,query)} ${archBadge}</div><div class="result-path">📍 ${escHtml(rack.position||'—')}</div><div class="result-match">matched ${fl}: ${highlight(rack[rack._match_field],query)}</div></div><div class="result-meta"><span class="tag">${rack.capacity} slots</span>${!rack._archived?'<span class="result-arrow">›</span>':''}</div></div>`;}html+=`</div>`;}
  if(showBoxes&&bCount>0){html+=`<div class="results-section"><div class="results-section-title">Boxes <span class="count-badge box-count-badge">${bCount}</span></div>`;for(const box of results.boxes){const fl=FIELD_LABELS[box._match_field]||box._match_field;const archBadge=box._archived?'<span class="search-archived-badge">ARCHIVED</span>':'';const boxClick=box._archived?'':(`goBox('${box.rack_id}','${box.id}')`);html+=`<div class="result-card${box._archived?' result-card-archived':''}" onclick="${boxClick}"><div class="result-icon box">BX</div><div class="result-body"><div class="result-name">${highlight(box.name,query)} ${archBadge}</div><div class="result-path">📍 ${escHtml(box._path)}</div><div class="result-match">matched ${fl}: ${highlight(box[box._match_field],query)}</div></div><div class="result-meta"><span class="tag">${boxSzLbl(box)}</span>${box.qr_code?`<span class="qr-badge">▦ QR</span>`:''} ${!box._archived?'<span class="result-arrow">›</span>':''}</div></div>`;}html+=`</div>`;}
  if(showVials&&vCount>0){html+=`<div class="results-section"><div class="results-section-title">Vials <span class="count-badge vial-count-badge">${vCount}</span></div>`;for(const vial of results.vials){const fl=FIELD_LABELS[vial._match_field]||vial._match_field;const archBadge=vial._archived?'<span class="search-archived-badge">ARCHIVED</span>':'';const vialClick=vial._archived?'':(`goBoxHighlight('${vial._rack.id}','${vial.box_id}',${vial.row_index},${vial.col_index})`);html+=`<div class="result-card${vial._archived?' result-card-archived':''}" onclick="${vialClick}"><div class="result-icon vial">${escHtml(vial.position_label)}</div><div class="result-body"><div class="result-name">${highlight(vial.name,query)} ${archBadge}</div><div class="result-path">📍 ${escHtml(vial._path)}</div><div class="result-match">matched ${fl}: ${highlight(vial[vial._match_field],query)}</div></div><div class="result-meta">${vial.sample_type?`<span class="tag">${escHtml(vial.sample_type)}</span>`:''}${vial.qr_code?`<span class="qr-badge">▦ QR</span>`:''} ${!vial._archived?'<span class="result-arrow">›</span>':''}</div></div>`;}html+=`</div>`;}
  el.innerHTML=html;
}
function setSearchFilter(f){searchFilter=f;renderSearch();}

// ── HISTORY ───────────────────────────────────────────────────────────────────
async function renderHistory(){
  showLoading();const el=document.getElementById('main-content');
  try{
    const params=new URLSearchParams({page:historyPage,limit:50,...historyFilter});
    const{entries,total,pages}=await api('GET',`/history?${params}`);
    const ac={create:'action-create',update:'action-update',delete:'action-delete'};
    const rows=entries.map(e=>{let diff='';if(e.action==='update'&&e.old_data&&e.new_data){const ch=[];for(const k of Object.keys(e.new_data)){if(k==='updated_at') continue;if(JSON.stringify(e.old_data[k])!==JSON.stringify(e.new_data[k])) ch.push(`<span class="diff-old">${escHtml(k)}: ${escHtml(String(e.old_data[k]??'—'))}</span> <span class="diff-new">→ ${escHtml(String(e.new_data[k]??'—'))}</span>`);}diff=ch.slice(0,3).join('<br>');}return `<tr><td style="white-space:nowrap">${fmtTs(e.timestamp)}</td><td><span class="action-badge ${ac[e.action]||''}">${e.action}</span></td><td><span class="tag">${e.entity_type}</span></td><td>${escHtml(e.entity_name)}</td><td>${escHtml(e.changed_by||'—')}</td><td>${diff}</td></tr>`;}).join('');
    el.innerHTML=`<div class="section-header"><div class="section-left"><div class="section-title">Change History</div><div class="section-sub">${total} total audit entries</div></div><div class="section-right"><a href="/api/export/history" target="_blank"><button class="btn btn-warn">↓ EXPORT LOG</button></a></div></div><div class="history-filters"><select class="form-select" style="width:130px" id="hf-type" onchange="applyHistoryFilter()"><option value="">All Types</option><option value="rack">Rack</option><option value="box">Box</option><option value="vial">Vial</option></select><select class="form-select" style="width:130px" id="hf-action" onchange="applyHistoryFilter()"><option value="">All Actions</option><option value="create">Create</option><option value="update">Update</option><option value="delete">Delete</option></select><input class="form-input" style="width:200px" id="hf-search" placeholder="Name / researcher…" oninput="applyHistoryFilter()"/></div>${entries.length?`<div style="overflow-x:auto"><table class="history-table"><thead><tr><th>TIMESTAMP</th><th>ACTION</th><th>TYPE</th><th>NAME</th><th>BY</th><th>CHANGES</th></tr></thead><tbody>${rows}</tbody></table></div><div class="pagination">${historyPage>1?`<button class="btn btn-sm" onclick="historyPage--;renderHistory()">‹ PREV</button>`:''}<span>Page ${historyPage} of ${pages}</span>${historyPage<pages?`<button class="btn btn-sm" onclick="historyPage++;renderHistory()">NEXT ›</button>`:''}</div>`:'<div class="empty-state">No history yet.</div>'}`;
    document.getElementById('hf-type').value=historyFilter.entity_type;document.getElementById('hf-action').value=historyFilter.action;document.getElementById('hf-search').value=historyFilter.search;
  }catch(e){toast(e.message,'err');}finally{hideLoading();}
}

function qrFieldHtml(fId,val){return `<div class="form-group"><label class="form-label">QR Code</label><div class="scan-row"><input class="form-input" id="${fId}" value="${escHtml(val||'')}" placeholder="Scan or type QR value…"/><button class="btn btn-qr" type="button" onclick="openQRScanner('${fId}')">▦ SCAN</button></div><div id="${fId}-hint" class="qr-hint">${val?'Stored: '+escHtml(val):''}</div></div>`;}
// Field scanner — used when operator clicks ▦ SCAN on a QR input field.
// Uses html5-qrcode attached to the existing #scanner-overlay div.
// The overlay already has a #qr-reader div we attach the scanner to.
let _fieldScanner = null;
let scanTargetId  = null;

function openQRScanner(tId){
  scanTargetId = tId;
  document.getElementById('qr-manual').value = '';
  const st = document.getElementById('scan-status');
  if(st){ st.textContent = 'Initialising camera…'; st.className = ''; }
  document.getElementById('scanner-overlay').style.display = 'flex';

  if(typeof Html5Qrcode === 'undefined'){
    if(st) st.textContent = '⚠ Scanner not loaded — use manual entry.';
    return;
  }

  const F = Html5QrcodeSupportedFormats;
  const formats = [
    F.QR_CODE, F.DATA_MATRIX,
    F.CODE_128, F.CODE_39, F.CODE_93,
    F.EAN_13, F.EAN_8, F.UPC_A, F.UPC_E,
    F.PDF_417, F.AZTEC, F.ITF,
  ].filter(f => f !== undefined);

  _fieldScanner = new Html5Qrcode('qr-reader', { formatsToSupport: formats, verbose: false });
  _fieldScanner.start(
    { facingMode: 'environment' },
    { fps: 10, disableFlip: false },
    (decodedText) => { applyQRResult(decodedText); },
    () => {}
  ).then(() => {
    if(st){ st.textContent = 'Hold code steady in view…'; st.className = 'detecting'; }
  }).catch(err => {
    const msg = String(err).includes('ermission') ? 'Camera permission denied — use manual entry.'
              : 'Camera unavailable — use manual entry.';
    if(st){ st.textContent = msg; st.className = ''; }
    _fieldScanner = null;
  });
}

function applyQRResult(val){
  stopScanner();
  const f = document.getElementById(scanTargetId);
  if(f){ f.value = val; f.focus(); }
  const h = document.getElementById(scanTargetId + '-hint');
  if(h) h.textContent = '✓ Captured: ' + val.slice(0, 50);
}

function stopScanner(){
  if(_fieldScanner){
    _fieldScanner.stop().catch(()=>{});
    _fieldScanner = null;
  }
  document.getElementById('scanner-overlay').style.display = 'none';
}

function useManualQR(){
  const v = document.getElementById('qr-manual').value.trim();
  if(!v){ alert('Enter a value.'); return; }
  applyQRResult(v);
}

// ============================================================================
// QR VIAL SCAN WORKFLOW — state machine
// ============================================================================
//
// This workflow is triggered by the "▦ SCAN VIAL QR" button on the home page.
// It guides the operator through a branching flow entirely inside the modal:
//
//   STEP 1 — Scan
//     Open camera (or accept manual entry). Wait for a QR value.
//
//   STEP 2a — Found (QR matches a vial in the database)
//     Show vial details + location path.
//     Confirm: "Remove this vial from storage?"
//       Yes → DELETE /api/boxes/:boxId/vials/:row/:col → done
//       No  → close modal
//
//   STEP 2b — Not found (QR not in database)
//     Inform user: "QR code not in inventory — add it?"
//       No  → close modal
//       Yes → proceed to step 3
//
//   STEP 3 — Select rack
//     List all racks. Operator clicks one.
//
//   STEP 4 — Select box
//     List all boxes in the chosen rack ordered by slot_position.
//     Operator clicks one.
//
//   STEP 5 — Select position
//     Show the vial grid for the chosen box (like the box view).
//     Operator clicks an EMPTY cell.
//     Occupied cells are shown but not clickable.
//
//   STEP 6 — Add vial form
//     Standard vial add form, QR code field pre-filled and read-only.
//     Operator fills remaining fields and presses Add.
//     PUT /api/boxes/:boxId/vials/:row/:col → navigate to that box → done
//
// STATE OBJECT
//   wfState holds everything that persists between steps:
//     qrCode     — the scanned/typed QR value
//     rack       — chosen rack object
//     box        — chosen box object
//     row, col   — chosen grid position (integers)
//   It is reset to null at the start of each new workflow run.
//
// STEP INDICATOR
//   Each step renders wfStepBar(currentStep, totalSteps) at the top of the
//   modal so the operator always knows where they are.
// ============================================================================

// Persistent state across workflow steps.
// null means no workflow is in progress.
let wfState = null;

// ── Step indicator HTML ───────────────────────────────────────────────────────
// currentStep is 1-based. Labels are abbreviated to fit.
function wfStepBar(current, labels){
  let html = '<div class="wf-steps">';
  labels.forEach((label, i) => {
    const stepNum = i + 1;
    const cls = stepNum < current ? 'done' : stepNum === current ? 'active' : '';
    html += `<div class="wf-step ${cls}" title="Step ${stepNum}: ${label}">${label}</div>`;
    if(i < labels.length - 1) html += `<div class="wf-step-line"></div>`;
  });
  html += '</div>';
  return html;
}

// ── STEP 1: Open scanner ──────────────────────────────────────────────────────
function openVialQRScan(){
  if(!curTank){ toast('Select a tank first','err'); return; }
  wfState = { qrCode: null, rack: null, box: null, row: null, col: null };

  openModal(`
    <h2>▦ SCAN CODE</h2>
    ${wfStepBar(1, ['Scan','Result','Rack','Box','Position','Details'])}

    <!-- html5-qrcode attaches the camera feed to this div automatically.
         The library manages the video element internally. -->
    <div id="wf-reader" style="width:100%;margin-bottom:8px"></div>

    <div id="wf-scan-status" style="font-family:var(--font-mono);font-size:11px;text-align:center;padding:6px;background:var(--bg);color:var(--muted);margin-bottom:8px">
      Initialising camera…
    </div>

    <div class="form-group">
      <label class="form-label">Or enter code value manually</label>

    </div>

}

// ── Camera scanner — html5-qrcode ────────────────────────────────────────────
// html5-qrcode handles camera access, frame capture, and decoding.
// It exposes Html5Qrcode and Html5QrcodeSupportedFormats as browser globals
// when loaded via the UMD build at /html5-qrcode.min.js.
//
// Supported formats: QR_CODE, DATA_MATRIX, CODE_128, CODE_39, CODE_93,
//   EAN_13, EAN_8, UPC_A, UPC_E, PDF_417, AZTEC, ITF, MAXICODE
//
// The scanner is embedded inline in the modal (not a full-screen overlay)
// so the operator keeps context visible during the workflow.

let _h5Scanner = null;  // Html5Qrcode instance — created per-scan, destroyed on stop

// Start the scanner attached to a DOM element by ID.
// On success, calls onResult(decodedText). On camera error, calls onError(message).
async function wfStartCamera(){
  const containerId = 'wf-reader';
  const container   = document.getElementById(containerId);
  if(!container){ console.error('[scanner] #wf-reader not found'); return; }

  const st = document.getElementById('wf-scan-status');

  // Check the library loaded
  if(typeof Html5Qrcode === 'undefined'){
    if(st){ st.textContent = '⚠ Scanner library not loaded — use manual entry.'; st.className = ''; }
    return;
  }

  // Build format list from Html5QrcodeSupportedFormats enum
  const F  = Html5QrcodeSupportedFormats;
  const formats = [
    F.QR_CODE, F.DATA_MATRIX,
    F.CODE_128, F.CODE_39, F.CODE_93,
    F.EAN_13, F.EAN_8, F.UPC_A, F.UPC_E,
    F.PDF_417, F.AZTEC, F.ITF,
  ].filter(f => f !== undefined);

  try{
    _h5Scanner = new Html5Qrcode(containerId, {
      formatsToSupport: formats,
      verbose: false,
    });

    await _h5Scanner.start(
      { facingMode: 'environment' },
      { fps: 10, disableFlip: false },
      (decodedText) => {
        // Code detected — stop scanner and hand off to the workflow
        wfStopCamera();
        wfHandleQR(decodedText);
      },
      (_errorMsg) => {
        // Per-frame "not found" — ignore, this fires constantly while scanning
      }
    );

    if(st){
      st.textContent = 'Scanning — hold code steady in view…';
      st.className   = 'detecting';
    }
  }catch(err){
    const msg = err.toString().includes('Permission')
      ? 'Camera permission denied — use manual entry.'
      : err.toString().includes('NotFound') || err.toString().includes('no camera')
        ? 'No camera found — use manual entry.'
        : `Camera error — use manual entry. (${err})`;
    if(st){ st.textContent = msg; st.className = ''; }
    _h5Scanner = null;
  }
}

function wfStopCamera(){
  if(_h5Scanner){
    _h5Scanner.stop().catch(()=>{});
    _h5Scanner = null;
  }
}

function wfUseManual(){
  const val = (document.getElementById('wf-manual')?.value || '').trim();
  if(!val){ toast('Enter a code value first', 'err'); return; }
  wfStopCamera();
  wfHandleQR(val);
}

function wfCancel(){
  wfStopCamera();
  wfState = null;
  closeModal();
}

// Close-modal click should also stop the camera

// ── STEP 2: Look up QR code and branch ────────────────────────────────────────
async function wfHandleQR(code){
  wfState.qrCode = code;

  // Show a brief "looking up…" status in the modal before the fetch returns
  const statusEl = document.getElementById('wf-scan-status');
  if(statusEl){
    statusEl.textContent = 'Looking up QR code…';
    statusEl.className = 'detecting';
  }

  try {
    // Exact-match lookup — returns 200 with vial data, or 404
    const result = await api('GET', `/vials/by-qr?code=${encodeURIComponent(code)}`);
    // Found — show removal confirmation
    wfShowFound(result);
  } catch(e) {
    if(e.message.includes('No vial found') || e.message.includes('404')){
      // Not found — show add confirmation
      wfShowNotFound(code);
    } else {
      toast('Lookup failed: ' + e.message, 'err');
      wfCancel();
    }
  }
}

// ── STEP 2a: Found — confirm removal ─────────────────────────────────────────

  const { vial, box, rack, path, position_label } = result;

  openModal(`
    <h2>▦ VIAL FOUND</h2>
    ${wfStepBar(2, ['Scan','Confirm','—','—','—','—'])}

    <div class="wf-result-card found">
      <div class="wf-result-title">✓ Match found in inventory</div>
      <div class="wf-result-name">${escHtml(vial.name)}</div>
      <div class="wf-result-path">📍 ${escHtml(path)}</div>
      <div class="wf-result-meta">
        ${vial.sample_type ? `<span class="wf-chip">${escHtml(vial.sample_type)}</span>` : ''}
        ${vial.volume      ? `<span class="wf-chip">${escHtml(vial.volume)}</span>` : ''}
        ${vial.researcher  ? `<span class="wf-chip">${escHtml(vial.researcher)}</span>` : ''}
        <span class="wf-chip" style="border-color:var(--accent2);color:var(--accent)">QR: ${escHtml(vial.qr_code)}</span>
      </div>
    </div>

    <div style="font-family:var(--font-mono);font-size:12px;color:var(--text);margin-bottom:16px">
      Remove this vial from storage?
      <span style="color:var(--danger);display:block;font-size:10px;margin-top:4px">⚠ This will delete the vial record permanently.</span>
    </div>

    <div class="modal-actions">
      <button class="btn" onclick="wfCancel()">CANCEL</button>
      <button class="btn" onclick="wfGoToVial('${jsStr(rack.id)}','${jsStr(box.id)}',${vial.row_index},${vial.col_index})">VIEW LOCATION</button>
      <button class="btn btn-danger" onclick="wfRemoveVial('${jsStr(box.id)}',${vial.row_index},${vial.col_index},'${jsStr(vial.name)}','${jsStr(rack.id)}')">✕ REMOVE</button>
    </div>
  `);
}

async function wfRemoveVial(boxId, row, col, name, rackId){
  try {
    await api('DELETE', `/boxes/${boxId}/vials/${row}/${col}?changedBy=${encodeURIComponent(getRes())}`);
    wfState = null;
    closeModal();
    toast(`Vial "${name}" removed from inventory`);
    // If we're currently looking at this box, refresh the grid
    if(view === 'box' && curBox && curBox.id === boxId){
      const { box, vials } = await api('GET', `/boxes/${boxId}/vials`);
      curBox = box; curBox._vials = vials; renderBox();
    }
    // If we're on the home page, nothing to refresh
  } catch(e){
    toast('Remove failed: ' + e.message, 'err');
  }
}

function wfGoToVial(rackId, boxId, row, col){
  wfCancel();
  highlightVial = { r: row, c: col };
  selVial = { r: row, c: col };
  goBox(rackId, boxId);
}

// ── STEP 2b: Not found — confirm add ─────────────────────────────────────────

    <div class="wf-result-card notfound">

      </div>

    </div>

    <div class="modal-actions">
