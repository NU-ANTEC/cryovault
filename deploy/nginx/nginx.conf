# =============================================================================
# nginx/nginx.conf — HTTP-only reverse proxy (sandbox / internal network)
# =============================================================================
#
# This configuration serves CryoVault over plain HTTP. It is appropriate for:
#   - Internal lab networks not exposed to the internet
#   - Sandbox / development deployments
#   - Situations where SSL is terminated upstream (VPN, institutional proxy)
#
# TO ADD HTTPS LATER
#   Replace this file with the full TLS version and provide certificates.
#   Options:
#     Self-signed: openssl req -x509 -nodes -days 365 -newkey rsa:2048
#                    -keyout certs/key.pem -out certs/cert.pem
#     Let's Encrypt: certbot certonly --standalone -d your-domain.com
#
# CHANGING THE PUBLIC PORT
#   Edit the ports: section in docker-compose.yml, not this file.
#   This file always listens on 80 inside the container; docker-compose
#   maps whatever host port you choose to that internal 80.
#   Example in docker-compose.yml:  "8080:80"  → access at :8080
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile    on;
  tcp_nopush  on;
  keepalive_timeout 65s;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml;
  gzip_min_length 1024;
  gzip_vary on;

  log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent rt=$request_time';
  access_log /var/log/nginx/access.log main;

  upstream cryovault_app {
    server app:3000;
    keepalive 16;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location / {
      proxy_pass http://cryovault_app;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_connect_timeout 10s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }
  }
}
