# =============================================================================
# nginx-ssl.conf — HTTPS reverse proxy for CryoVault
# =============================================================================
#
# This is the active config when SSL is enabled.
# Certs are mounted from ./certs/ on the host into /etc/nginx/certs/ in the
# container. Generate them with:  ./deploy/scripts/setup-ssl.sh
#
# Ports inside the container are always 80 (HTTP) and 443 (HTTPS).
# What the HOST sees is controlled by docker-compose.yml:
#   HTTP_PORT=8080   → http://server:8080  redirects to HTTPS
#   HTTPS_PORT=8443  → https://server:8443  serves the app
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile   on;
  tcp_nopush on;
  keepalive_timeout 65s;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml;
  gzip_min_length 1024;
  gzip_vary on;

  log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent';
  access_log /var/log/nginx/access.log main;

  upstream cryovault_app {
    server app:3000;
    keepalive 16;
  }

  # ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host:$server_port$request_uri;
  }

  # ── HTTPS ──────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    http2  on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;

    client_max_body_size 50m;

    location / {
      proxy_pass http://cryovault_app;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_connect_timeout 10s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }
  }
}
