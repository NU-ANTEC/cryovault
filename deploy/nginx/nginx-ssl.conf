# =============================================================================
# nginx/nginx-ssl.conf — HTTPS reverse proxy with HTTP→HTTPS redirect
# =============================================================================
#
# USAGE
#   1. Obtain certificates (see deploy/scripts/setup-ssl.sh for both options)
#   2. Replace the current nginx.conf with this file:
#        cp deploy/nginx/nginx-ssl.conf deploy/nginx/nginx.conf
#   3. Update docker-compose.yml to mount the certs directory and expose 443:
#        See the comments in docker-compose.yml or run setup-ssl.sh
#   4. Set your domain in the server_name directives below
#   5. docker compose down && docker compose up -d nginx
#
# CERTIFICATE PATHS (inside the nginx container)
#   /etc/nginx/certs/cert.pem   — certificate (or fullchain.pem for Let's Encrypt)
#   /etc/nginx/certs/key.pem    — private key
#
# These map to ./certs/ on the host (bind-mounted in docker-compose.yml).
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile   on;
  tcp_nopush on;
  keepalive_timeout 65s;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml;
  gzip_min_length 1024;
  gzip_vary on;

  log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent rt=$request_time';
  access_log /var/log/nginx/access.log main;

  upstream cryovault_app {
    server app:3000;
    keepalive 16;
  }

  # ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
  # All plain HTTP traffic is permanently redirected to HTTPS.
  server {
    listen 80;
    server_name _;   # Replace with your domain e.g. cryo.mylab.org

    # Let's Encrypt ACME challenge — must stay on HTTP for cert renewal
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS server ───────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    http2  on;
    server_name _;   # Replace with your domain e.g. cryo.mylab.org

    # ── Certificate files ─────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # ── Modern TLS settings ───────────────────────────────────────────────────
    # TLSv1.2 kept for older lab instruments; remove if not needed.
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header X-Frame-Options           "SAMEORIGIN"       always;

    client_max_body_size 50m;

    location / {
      proxy_pass http://cryovault_app;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_connect_timeout 10s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }
  }
}
